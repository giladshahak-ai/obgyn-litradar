al diabetes mellitus among women without pre-existing diabetes.\nDATA SOURCES: Comprehensive searches were performed in PubMed, Web of Science, Scopus, the Cochrane Database of Systematic Reviews, and ClinicalTrials.gov from inception through April 2025.\nSTUDY ELIGIBILITY CRITERIA: Randomized controlled trials enrolling women without pre-existing diabetes, either pregnant or planning conception within six months, were included. Eligible studies compared myo-inositol supplementation with placebo or standard care.\nSTUDY APPRAISAL AND SYNTHESIS METHODS: Random-effects meta-analyses were conducted to calculate pooled relative risks and 95% confidence intervals. Heterogeneity was quantified with the I2 statistic. Sensitivity analyses, including leave-one-out testing, were performed to evaluate the influence of individual studies. Risk of bias was evaluated using the Cochrane Handbook criteria.\nRESULTS: Twelve randomized controlled trials comprising 4,765 women met inclusion criteria. Most trials were of moderate to high quality, with some concerns regarding bias. Myo-inositol supplementation significantly reduced the risk of gestational diabetes mellitus compared with control groups, corresponding to a 44% risk reduction. No significant differences were observed in secondary maternal outcomes, including hypertensive disorders and caesarean delivery, or neonatal outcomes such as macrosomia, preterm birth, and neonatal hypoglycaemia.\nCONCLUSIONS: Myo-inositol supplementation in pregnancy or preconception significantly lowers the risk of gestational diabetes mellitus in women without pre-existing diabetes. These findings support myo-inositol as a promising, safe, and accessible preventive strategy for gestational diabetes and reinforce its potential role in improving maternal metabolic health.", "journal": "AJOG", "date": "2026-06-03", "authors": ["Poyatos León Raquel", "Martínez-Vizcaíno Vicente", "Sequí Domínguez Irene", "Sanabria Martínez Gema", "Díez Fernández Ana", "Alberto Martínez Hortelano José"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article", "Review"], "importance": 96, "breakdown": {"design": 100, "journal": 90, "recency": 97, "total": 96.3}, "doi": "10.1016/j.ajog.2026.05.020", "analysis": {"verdict_line": "מטא-אנליזה של 12 RCT: מיו-אינוזיטול מפחית אבחנת GDM ב-44% — אך תוצאים קליniים קשים לא השתפרו.", "critic_score": 3, "score_rationale": "רמת ראיות גבוהה (מטא של RCTs) אך התועלת על תוצאים קשים נעדרת, וההפחתה מדווחת יחסית בלבד.", "evidence_level": "Oxford CEBM 1a (מטא-אנליזה של RCTs) · GRADE: Moderate (חשש להטיה והטרוגניות)", "source_scope_warning": "הניתוח מבוסס תקציר בלבד — I², רווחי סמך, ומידע על הטיית פרסום אינם זמינים.", "study_snapshot": {"design": "סקירה שיטתית ומטא-אנליזה (random-effects) של 12 RCT", "population": "4,765 נשים ללא סוכרת קודמת, בהריון או טרום-הריון", "n": "4,765 (12 מחקרים)", "intervention": "תוסף מיו-אינוזיטול מול פלצבו/טיפול רגיל", "primary_outcome": "אבחנת סוכרת הריון (GDM)", "key_result": "הפחתה יחסית של 44% ב-GDM (RR לא דווח במדויק בתקציר); תוצאים משניים — ללא הבדל מובהק"}, "strengths": ["תכנון ברמת הראיות הגבוהה ביותר — מטא-אנליזה של RCTs בלבד.", "מדגם מצרפי גדול (4,765 נשים, 12 מחקרים) ומנוע random-effects ההולם הטרוגניות.", "חיפוש מקיף (5 מאגרים) + ניתוחי רגישות leave-one-out + הערכת הטיה לפי Cochrane.", "תוצאה עקבית בכיוון תועלת על התוצא הראשוני."], "weaknesses": [{"issue": "התועלת על תוצאים קליניים קשים נעדרת: מקרוזומיה, HDP, קיסרי, היפוגליקמיה ילודית — ללא הבדל מובהק.", "severity": "גבוהה", "impact": "GDM הוא תוצא-ביניים; ללא שיפור בתוצאים האמיתיים, המשמעות הקלינית של ההפחתה מוגבלת."}, {"issue": "'44% הפחתה' הוא ערך יחסי; הפחתה מוחלטת ו-NNT לא דווחו בתקציר.", "severity": "בינונית", "impact": "לא ניתן לאמוד את גודל האפקט הקליני האמיתי ללא הנתון המוחלט."}, {"issue": "הטרוגניות צפויה בקריטריוני אבחון GDM, מינון ועיתוי המיו-אינוזיטול בין המחקרים.", "severity": "בינונית", "impact": "מערערת על מזיגות התוצאות; ערך I² אינו זמין בתקציר."}, {"issue": "'some concerns regarding bias' — איכות בינונית, וחלק ניכר ממחקרי המיו-אינוזיטול מאוכלוסיות ספציפיות.", "severity": "בינונית", "impact": "מגביל הכללה לאוכלוסייה הכללית בארץ."}], "spin_alert": {"detected": true, "quote": "promising, safe, and accessible preventive strategy... reinforce its potential role in improving maternal metabolic health", "reality": "המסקנה מרחיבה ל'בריאות מטבולית' בעוד שתוצאים מטבוליים/קליניים קשים (HDP, מקרוזומיה) דווקא לא השתפרו."}, "stats_red_flags": ["תוצא ראשוני הוא surrogate (אבחנת GDM) ולא תוצא קליני קשה.", "אפקט מדווח כ-relative risk reduction ללא ARR/NNT — נוטה להגדיל רושם.", "ללא דיווח בתקציר על I² והערכת הטיית פרסום (funnel/Egger)."], "clinical_bottom_line": "מיו-אינוזיטול נראה מפחית אבחנת GDM ובטוח, ויכול להישקל כאופציה זולה ובסיכון נמוך, במיוחד בנשים בסיכון גבוה. אך היעדר שיפור בתוצאים קליניים קשים ממתן את ההתלהבות — לא 'משנה משחק' עד שיודגם שיפור בתוצאי אם/ילוד.", "what_would_change_my_mind": "דיווח ARR/NNT משמעותי + הפחתה מובהקת במקרוזומיה/HDP, או מטא-אנליזה של נתוני מטופל פרטני (IPD) עם הטרוגניות נמוכה — היו משדרגים ל'משני-פרקטיקה'.", "devils_advocate": "מנגד: מניעת GDM כשלעצמה מורידה עומס מעקב, אינסולין וחרדת מטופלת; התערבות זולה, בטוחה וזמינה עם בסיס RCT איתן. גם אם התוצאים הקשים לא זזו במחקרים (שאולי תת-כוח לאיתורם), פרופיל סיכון-תועלת חיובי עשוי להצדיק שימוש בנשים בסיכון.", "one_liner_for_rounds": "מיו-אינוזיטול: מטא של 12 RCT מראה ↓44% ב-GDM, אבל בלי שיפור במקרוזומיה/HDP — בטוח וזול, לא פורץ-דרך."}, "analysis_scope": "ABSTRACT_ONLY"}, {"pmid": "42070572", "title": "Effects of ovarian ablation or suppression on breast cancer recurrence and survival: patient-level meta-analysis of 15 000 women in 23 randomised trials.", "abstract": "BACKGROUND: For premenopausal women with oestrogen receptor (ER)-positive early breast cancer, the additional protective effect of ovarian function suppression (OFS, by ablation or drugs) may depend on menopausal status after any chemotherapy, and tamoxifen usage. We assess the effects of OFS on breast cancer outcomes among premenopausal women and how they vary by patient or tumour characteristics and receipt of other treatments.\nMETHODS: We conducted a meta-analysis of individual participant data from the randomised trials comparing OFS versus no OFS, in women with ER-positive or ER-unknown early breast cancer who were premenopausal at randomisation and younger than 55 years. Trials were categorised by whether premenopausal status was or was not confirmed after chemotherapy (if given), and by allocation to tamoxifen. Primary outcomes were invasive breast cancer recurrence, breast cancer mortality, other mortality, and all-cause mortality. ER-weighted log-rank methods estimated event rate ratios (RRs) for ER-positive disease.\nFINDINGS: Datasets were provided for 23 of 25 identified eligible trials, comprising 18 851 (98·9%) of 19 053 randomly assigned women. Among 15 075 premenopausal women with ER-positive or ER-unknown tumours, allocation to OFS significantly reduced recurrence rates (RR 0·82, 95% CI 0·77-0·87; p<0·00001), with larger reductions in women who were confirmed premenopausal after chemotherapy (or who did not receive chemotherapy) than in those with unconfirmed premenopausal status after chemotherapy; heterogeneity p=0·0004. Among confirmed premenopausal women, recurrence reductions were larger in older trials without tamoxifen (RR 0·61, 0·52-0·71; p<0·0001) than in more recent trials of OFS plus tamoxifen versus tamoxifen (RR 0·79, 0·70-0·91; p=0·0008). In these more recent trials, the additional recurrence reduction with OFS appeared larger in women younger than 45 years than in women aged 45-54 years (RR 0·73, 0·63-0·86 vs RR 0·95, 0·75-1·21; p=0·072); in those younger than 45 years, breast cancer mortality was similarly improved (RR 0·74, 0·58-0·94; p=0·012). There was no increase in deaths without recurrence. Findings did not differ significantly by OFS method or other recorded patient or tumour characteristics.\nINTERPRETATION: For premenopausal women with ER-positive early breast cancer, even if chemotherapy or tamoxifen are given, OFS significantly reduces the 15-year risk of recurrence and death.\nFUNDING: Nuffield Department of Population Health, University of Oxford; Cancer Research UK; the Breast Cancer Research Foundation; and the UK Medical Research Council.", "journal": "Lancet", "date": "2026-05-02", "authors": [], "topics": ["אונקוגינקולוגיה", "הפרעות מחזור והורמונים"], "pub_types": ["Journal Article", "Meta-Analysis"], "importance": 96, "breakdown": {"design": 100, "journal": 100, "recency": 80, "total": 96.1}, "doi": "10.1016/S0140-6736(26)00313-2", "analysis": null, "analysis_scope": null}, {"pmid": "42252605", "title": "Association Between Lateral Placenta and Adverse Maternal and Perinatal Outcomes: A Systematic Review and Meta-Analysis.", "abstract": "BACKGROUND: Adverse maternal and perinatal outcomes such as preeclampsia, small-for-gestational age (SGA) and preterm birth remain major global health concerns. Beyond known high-risk placental features, emerging evidence suggests lateral placenta to be associated with impaired uteroplacental blood flow resulting in placenta dysfunction and adverse outcomes. A better understanding of these associations requires synthesizing both crude and adjusted effect estimates from available evidence.\nOBJECTIVES: To comprehensively review and synthesize available evidence on the association between lateral placenta and adverse maternal and perinatal outcomes.\nSEARCH STRATEGY: MEDLINE (PubMed), EMBASE, Scopus and Cochrane CENTRAL were searched on 25th August, 2025.\nSELECTION CRITERIA: Studies that assessed the association between lateral placentation and adverse maternal and perinatal outcomes in singleton pregnancies.\nDATA COLLECTION AND ANALYSIS: Data were independently extracted by two reviewers. The random-effects model was used to pool estimates of both crude and adjusted odds ratios (ORs) with corresponding 95% confidence interval (CI). Statistical heterogeneity was assessed by the I2 statistic and Cochran's Q test.\nMAIN RESULTS: Twenty one eligible studies with a total of 162 727 singleton pregnancies were included in the meta-analyses. Lateral placenta was associated with preeclampsia (OR = 1.65, 95% CI: 1.25, 2.19, I2 = 41.0%), SGA (OR = 1.40, 95% CI: 1.17, 1.68, I2 = 69.0%), preterm birth < 34 weeks (OR = 2.10, 95% CI: 1.62, 2.72, I2 = 0.0%), preterm birth < 37 weeks (OR = 1.50, 95% CI: 1.26, 1.80, I2 = 60.5%), retained placenta (OR = 2.52, 95% CI: 1.60, 3.95, I2 = 87.7%), and non-vertex foetal presentation at birth (OR = 1.50, 95% CI: 1.19, 1.89, I2 = 28.6%). Two individual studies reported independent association between lateral placenta and preeclampsia; with adjusted odds ratio (aOR) of 2.04 (95% CI: 1.28, 3.25) and 1.32 (95% CI: 1.04, 1.67). Pooled adjusted OR (95% CI) demonstrated increased odds of SGA (aOR = 1.84, 95% CI: 1.33, 2.53, I2 = 0.0%), and retained placenta (aOR = 4.43, 95% CI: 1.70, 11.53, I2 = 76.1%). Marginal increase in odds was noted for preterm birth < 34 weeks (aOR = 2.14, 95% CI: 1.34, 3.41, I2 = 0.00%) and preterm birth < 37 weeks (aOR = 1.54, 95% CI: 1.11, 2.13, I2 = 38.8%).\nCONCLUSIONS: Lateral placenta is associated with increased odds of preeclampsia, SGA, preterm birth, non-vertex foetal presentation, and retained placenta. After controlling for confounders, lateral placenta remained independently associated with increased odds of SGA, preterm birth, and retained placenta. More studies that adjust for confounders are, however, needed to further clarify and strengthen the evidence base of this independent association.", "journal": "BJOG", "date": "2026-06-07", "authors": ["Arkorful Joseph", "Nyamson Juliana", "Adu-Bredu Theophilus", "Adu-Bonsaffoh Kwame", "Browne Joyce", "Piersson Albert D", "Bloemenkamp Kitty"], "topics": ["סיבוכי הריון", "רפואת אם-עובר"], "pub_types": ["Journal Article", "Review"], "importance": 94, "breakdown": {"design": 100, "journal": 80, "recency": 99, "total": 93.8}, "doi": "10.1111/1471-0528.70278", "analysis": null, "analysis_scope": null}, {"pmid": "42061782", "title": "Neonatal and obstetric outcomes following periconceptional exposure to glucagon-like peptide-1 receptor agonists: a systematic review and meta-analysis.", "abstract": "OBJECTIVE: To evaluate the association between periconceptional exposure to glucagon-like peptide-1 receptor agonists and fetal, pregnancy-related, obstetric, and delivery outcomes.\nDATA SOURCES: PubMed, Embase, and Web of Science were searched from database inception through November 2025 to identify relevant studies.\nSTUDY ELIGIBILITY CRITERIA: Cohort and observational studies comparing human pregnancies with periconceptional glucagon-like peptide-1 receptor agonist exposure to unexposed comparator groups were included. Case reports and case series were also included for narrative synthesis. Studies involving nonhuman animals were excluded from the primary meta-analysis but referenced in the background synthesis.\nSTUDY APPRAISAL AND SYNTHESIS METHODS: This systematic review was conducted according to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses guidelines. Random-effects meta-analyses were performed using odds ratios or mean differences with 95% confidence intervals. Heterogeneity was assessed using the I-squared statistic. Sensitivity analyses were conducted using comparator-specific control groups to account for maternal disease.\nRESULTS: Twenty-two studies, comprising 49,395 human pregnancies with periconceptional glucagon-like peptide-1 receptor agonist exposure, were included. Meta-analysis of 10 cohort and observational studies showed no statistically significant association between exposure and major congenital malformations, cardiac malformations, gestational age and weight, preterm delivery, live birth, spontaneous pregnancy loss, hypertensive disorders of pregnancy, or cesarean delivery. A small but statistically significant association with renal malformations was detected (odds ratio, 1.23; 95% confidence interval, 1.09-1.39); however, this was largely driven by a single large cohort with substantial baseline imbalances. Heterogeneity was moderate to high for several outcomes. Narrative synthesis of case reports and series identified no consistent pattern of adverse outcomes.\nCONCLUSION: Current human evidence does not demonstrate a consistent association between periconceptional glucagon-like peptide-1 receptor agonist exposure and major adverse fetal, pregnancy, obstetric, or labor outcomes. The observed risk for renal malformations should be interpreted with caution as it likely reflects residual confounding by maternal disease severity. These findings provide cautious reassurance following inadvertent exposure but do not support routine use during pregnancy, highlighting the need for robust studies with long-term follow-up.", "journal": "AJOG", "date": "2026-04-28", "authors": ["Hakim Jolie", "Rajesh Diya", "Tello Javier Ananda"], "topics": ["סיבוכי הריון", "רפואת אם-עובר", "לידה ומיילדות"], "pub_types": ["Journal Article", "Review"], "importance": 93, "breakdown": {"design": 100, "journal": 90, "recency": 78, "total": 92.7}, "doi": "10.1016/j.ajog.2026.04.037", "analysis": null, "analysis_scope": null}, {"pmid": "42055184", "title": "Late-onset diagnosis of gestational diabetes after normal mid-pregnancy screening in women with large for gestational age or polyhydramnios: a systematic review and meta-analysis.", "abstract": "OBJECTIVE: To determine the detection rate of late-onset gestational diabetes mellitus and associated perinatal outcomes in women with normal mid-pregnancy glucose screening who undergo repeat oral glucose tolerance test due to suspected large-for-gestational-age fetuses or polyhydramnios.\nDATA SOURCES: We systematically searched PubMed/MEDLINE, Embase, Web of Science, and the Cochrane Library for studies published from January 2010 to November 2024.\nSTUDY ELIGIBILITY CRITERIA: We included cohort studies reporting late gestational diabetes mellitus detection rates in women with documented normal mid-pregnancy glucose testing (negative glucose challenge test or normal 75 g oral glucose tolerance test at 24-28 weeks) who underwent repeat oral glucose tolerance test after 28 weeks due to sonographic findings of suspected large for gestational age or polyhydramnios. We excluded studies of women with preexisting diabetes, those lacking documented normal mid-pregnancy screening, and those examining routine late testing without specific clinical indication.\nSTUDY APPRAISAL AND SYNTHESIS METHODS: Study quality was assessed using the Newcastle-Ottawa Scale. Pooled detection rates with 95% confidence intervals were calculated using random-effects meta-analysis. Subgroup analyses were performed by clinical indication, timing of testing, initial screening method (2-step vs 1-step), and maternal body mass index. Perinatal outcomes were compared using pooled odds ratios calculated with the Mantel-Haenszel method.\nRESULTS: Six cohort studies including 2166 women met inclusion criteria. The pooled detection rate was 15.0% (95% confidence interval, 9.9%-21.0%; I2=91%). Detection rates varied significantly by indication: suspected large for gestational age 20.8% (95% confidence interval, 17.4%-24.6%) vs isolated polyhydramnios 4.8% (95% confidence interval, 2.0%-10.8%). Women with late-onset gestational diabetes mellitus had significantly higher rates of neonatal hypoglycemia (odds ratio, 1.82; 95% confidence interval, 1.18-2.81), overall cesarean delivery (odds ratio, 2.00; 95% confidence interval, 1.47-2.72), elective cesarean for large for gestational age/macrosomia (odds ratio, 3.37; 95% confidence interval, 2.01-5.64), emergent cesarean (odds ratio, 1.64; 95% confidence interval, 1.05-2.57), and induction of labor (odds ratio, 2.27; 95% confidence interval, 1.32-3.89). Macrosomia by birthweight and large for gestational age at delivery were not significantly elevated.\nCONCLUSION: Late oral glucose tolerance test detects gestational diabetes mellitus in approximately one in 6 women with normal mid-pregnancy screening who develop large for gestational age or polyhydramnios. Late-onset gestational diabetes mellitus is associated with significantly increased neonatal hypoglycemia and cesarean delivery, with the largest effect for elective cesarean for suspected large for gestational age/macrosomia. These findings may inform clinical decision-making regarding repeat glucose testing in the third trimester.", "journal": "AJOG", "date": "2026-04-27", "authors": ["Dominsky Omri", "Berkovitz-Shperling Roza", "Rosenberg-Fridman Michal", "Gabbai Daniel", "Ram Shai", "Yogev Yariv"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article", "Review"], "importance": 93, "breakdown": {"design": 100, "journal": 90, "recency": 78, "total": 92.6}, "doi": "10.1016/j.ajog.2026.04.036", "analysis": null, "analysis_scope": null}, {"pmid": "42113889", "title": "Left and right myocardial performance indices in growth-restricted fetuses: systematic review and meta-analysis.", "abstract": "OBJECTIVES: To evaluate alterations in fetal cardiac function in pregnancies complicated by fetal growth restriction (FGR) by synthesizing evidence on myocardial performance index (MPI) and its constituent parameters for both the left and right ventricles. The secondary objective was to explore the influence of timing of FGR onset (early vs late) on these parameters.\nMETHODS: We conducted a systematic review and meta-analysis of observational studies by searching PubMed/MEDLINE, EMBASE, Scopus, Web of Science and the Cochrane Central Register of Controlled Trials (CENTRAL) databases from inception until August 2025. Eligible studies compared fetal MPI, isovolumetric contraction time (ICT), ejection time (ET), isovolumetric relaxation time (IRT) and/or peak early-to-late diastolic filling velocity ratio (E/A ratio) between FGR fetuses and healthy controls. Data reported in original publications as median with interquartile range, range or 95% CI were converted to mean ± SD. A random-effects model was used to calculate the pooled standardized mean difference (SMD) with 95% CI. Prespecified subgroup analyses were performed based on ventricular laterality, timing of FGR onset and data presentation type. The protocol was registered with PROSPERO (registration number: CRD420251075193).\nRESULTS: Fifteen studies, comprising 709 FGR fetuses and 867 controls, were included. Compared with controls, FGR fetuses exhibited significant left ventricular dysfunction, characterized by a higher left MPI (SMD, 0.85 (95% CI, 0.53-1.16)), prolonged left ICT (SMD, 0.53 (95% CI, 0.08-0.99)) and shorter left ET (SMD, -0.56 (95% CI, -0.84 to -0.29)). The most profound alteration was a prolongation of the left IRT in FGR cases (SMD, 2.48 (95% CI, 1.55-3.41)). Right ventricular assessment revealed a prolonged right IRT in FGR fetuses compared with controls (SMD, 1.90 (95% CI, 0.72-3.07)). Subgroup analysis showed that myocardial functional alterations affect both early- and late-onset FGR phenotypes, with early cases showing a non-significant trend toward more pronounced impairment. Sensitivity analysis including only studies that employed stricter diagnostic criteria for FGR confirmed these findings. Significant publication bias was detected for the analysis of left MPI and left IRT.\nCONCLUSIONS: FGR is associated with significant biventricular cardiac dysfunction, characterized primarily by impaired myocardial relaxation, as indicated by a markedly prolonged IRT. The IRT appears to be a more sensitive marker of cardiac compromise in FGR compared with the traditional E/A ratio. These findings support the use of MPI and its components as valuable adjunctive tools in the surveillance of FGR pregnancies. © 2026 The Author(s). Ultrasound in Obstetrics & Gynecology published by John Wiley & Sons Ltd on behalf of International Society of Ultrasound in Obstetrics and Gynecology.", "journal": "Ultrasound O&G", "date": "2026-05-11", "authors": ["Sirico A", "Mappa I", "Maruotti G M", "Cobellis L", "Rizzo G"], "topics": ["רפואת אם-עובר"], "pub_types": ["Journal Article", "Review"], "importance": 91, "breakdown": {"design": 100, "journal": 80, "recency": 85, "total": 90.9}, "doi": "10.1002/uog.70233", "analysis": null, "analysis_scope": null}, {"pmid": "42208069", "title": "Carbon Dioxide Nonablative Laser Compared with Topical Clobetasol for Lichen Sclerosus: A Randomized Controlled Trial.", "abstract": "OBJECTIVE: To compare nonablative carbon dioxide (CO2) laser treatment with topical clobetasol propionate for symptom control in women with vulvar lichen sclerosus (LS).\nMETHODS: We conducted a prospective, randomized, open-label trial that included women with symptomatic LS. Participants were randomized to three courses of CO2 laser treatment every 3 weeks or to a 3-month regimen of tapered topical clobetasol propionate 0.05%. The primary outcome was the change in the BIP (burn-itch-pain) score (range 0-30) from baseline to 3 months. Secondary outcomes included physician-rated visual improvement and overall improvement, and disease-specific quality of life (QOL). Ninety participants per group provided 90% power to detect a 2-point between-group BIP score difference (SD 4; 2-sided α=0.05). Analyses were intention-to-treat. Prespecified multivariable linear regression adjusted for baseline symptom severity, age, body mass index (BMI), smoking status, previous corticosteroid use, and disease duration.\nRESULTS: Between November 2021 and March 2025, 245 women were randomized (laser: n=123; clobetasol propionate: n=122). At 3 months, symptom improvement was greater in the laser group (median ΔBIP score -8 [IQR -13 to-3]) than in the clobetasol propionate group (-5 [IQR, -10.75 to 0]; P=.007). In the multivariable analysis, laser treatment remained independently associated with greater symptom improvement (adjusted β, -2.90; 95% CI, -4.64 to -1.15; P=.001). Physician-rated visual improvement and overall improvement, and disease-specific QOL change favored laser therapy. Both treatments were generally well tolerated, with no serious treatment-related adverse events. During an exploratory postrandomization phase after the 3-month primary endpoint assessment, participants could choose to cross over to the alternative treatment. Patients who crossed over from clobetasol propionate to laser experienced additional symptom improvement from 3 to 6 months. Results were robust to sensitivity analyses for missing outcome data.\nCONCLUSION: Laser treatment resulted in greater symptom improvement than clobetasol propionate therapy for women with vulvar LS. Sequential treatment with clobetasol propionate followed by CO2 laser may further improve clinical symptoms.\nCLINICAL TRIAL REGISTRATION: ClinicalTrials.gov, NCT05010421.", "journal": "Green Journal", "date": "2026-05-28", "authors": ["Hecken Julia M", "Shoham Ilana", "Tempfer Clemens B", "Rezniczek Günther A"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article"], "importance": 91, "breakdown": {"design": 90, "journal": 90, "recency": 93, "total": 90.7}, "doi": "10.1109/MCSE.2007.55", "analysis": null, "analysis_scope": null}, {"pmid": "42087841", "title": "Factors Associated With Menopause Symptoms: A Systematic Review and Meta-Analysis.", "abstract": "BACKGROUND: Menopause, marked by hormonal decline and menstrual cessation, is associated with various symptoms. Socio-demographic and behavioural factors may influence symptom type and severity. Understanding these associations can inform better symptom management.\nOBJECTIVES: To identify factors associated with the presence and severity of menopausal symptoms through systematic review and meta-analysis.\nSEARCH STRATEGY: We searched Medline, Embase, CINAHL and Cochrane for studies on demographic, behavioural, or health factors linked to vasomotor, vaginal dryness and joint symptoms in women aged 40-60.\nSELECTION CRITERIA: Studies reporting odds ratios or raw numbers for symptom presence or severity were included.\nDATA COLLECTION AND ANALYSIS: Studies were combined for meta-analysis, reporting odds ratios and 95% confidence intervals. Quality assessment was performed to quantify the risk of bias.\nRESULTS: Of 9228 screened articles, 61 were meta-analysed. Compared with White women, Black women had higher odds of vasomotor symptom presence (OR 1.65, 1.41-1.94) and severity (OR 1.91, 1.10-3.29), and vaginal dryness presence (OR 1.27, 1.10-1.47), while Asian had lower vasomotor symptom presence and severity (OR 0.40, 0.22-0.72; OR 0.55, 0.53-0.56). Higher education (OR 1.31, 1.09-1.56), high income (OR 1.41, 1.01-1.97) and depression (OR 2.36, 1.51-3.70) were associated with increased presence of vasomotor symptoms. Smoking and obesity were associated with both presence (OR 1.63, 1.30-2.04 and 1.35, 1.02-1.78) and severity (OR 1.56, 1.07-2.27 and 1.42, 1.11-1.83) of vasomotor symptoms.\nCONCLUSION: Socio-demographic and behavioural factors, including ethnicity, education, income, smoking, obesity and depression, influence menopausal symptoms, highlighting the need for personalised care.\nTRIAL REGISTRATION: PROSPERO number: CRD42023459154.", "journal": "BJOG", "date": "2026-05-06", "authors": ["Hoang Janice", "Halliday Kathryn", "Allen Deborah", "Mtika Wema Meranda", "Tranter Eve", "Glover Grace", "Tatnell Lynn", "Hippisley-Cox Julia", "Coupland Carol", "Hillman Sarah", "Hirst Jennifer"], "topics": ["הפרעות מחזור והורמונים"], "pub_types": ["Journal Article", "Review"], "importance": 90, "breakdown": {"design": 100, "journal": 80, "recency": 82, "total": 90.4}, "doi": "10.1111/1471-0528.70257", "analysis": null, "analysis_scope": null}, {"pmid": "42070963", "title": "Perinatal outcomes following intrauterine transfusion for fetal anemia secondary to fetal or placental tumor: systematic review.", "abstract": "OBJECTIVE: To evaluate the characteristics and outcomes of pregnancies with a prenatally detected fetal or placental tumor with associated fetal anemia that underwent intrauterine transfusion (IUT).\nMETHODS: We searched PubMed, EMBASE, Web of Science, Scopus and Google Scholar databases for studies reporting on singleton pregnancies with a prenatally detected fetal or placental tumor complicated by fetal anemia that underwent IUT, published from inception to October 2024. Only articles written in the English language were considered eligible for inclusion. We excluded multiple gestations, fetuses with concomitant structural anomaly, cases that underwent IUT to treat fetal anemia secondary to intraoperative tumor bleeding and cases that received blood products other than red blood cells. Cases in which the tumor was detected postnatally, cases that underwent termination of pregnancy, studies with incomplete data and systematic reviews were also excluded. The primary outcome was perinatal death, defined as intrauterine fetal demise (IUFD) > 22 weeks' gestation or neonatal death within 28 days after birth. Secondary outcomes included IUFD, neonatal death, preterm labor (PTL), preterm prelabor rupture of membranes (PPROM), placental abruption, and spontaneous or medically indicated live preterm birth (PTB). We performed exploratory subgroup analyses, including differences in tumor size according to the presence or absence of additional non-structural complications, as well as differences in baseline characteristics according to perinatal death status and differences in obstetric and perinatal outcomes according to whether the patient underwent prenatal tumor resection, embolization or ablation in addition to IUT.\nRESULTS: We included 43 cases in our analysis, including 42 cases from 34 articles identified in the literature search and an additional case managed at our institution. The median hemoglobin level before the initial IUT was 7.0 (interquartile range, 6.0-8.8) g/dL. Most cases (92.5%) had an additional non-structural complication at baseline. Prenatal tumor resection, embolization or ablation was performed as an adjunct to IUT in 40.0% of cases. PTL, PPROM or placental abruption complicated 43.2% of cases. PTB occurred in 81.1% of cases. Perinatal death occurred in 11 (25.6%) cases. We identified a higher likelihood of perinatal death in cases with fetal hydrops (odds ratio (OR), 6.3 (95% CI, 1.1-37.7); P = 0.04) or cardiomegaly (OR, 6.3 (95% CI, 1.1-36.9); P = 0.04), and a lower likelihood of perinatal death was associated with higher fetal hemoglobin after the initial IUT (OR, 0.4 (95% CI, 0.2-0.8), P = 0.01). Perinatal death rates were similar regardless of management strategy (12.5% for IUT as a standalone therapy vs 31.3% for IUT as an adjunct to tumor resection, embolization or ablation; P = 0.1).\nCONCLUSION: Pregnancies with a prenatally detected fetal or placental tumor, complicated by fetal anemia that underwent IUT, have a high rate of additional non-structural complications. The rate of perinatal death in this population is high, likely due to the severity of the fetal condition at baseline and high rates of obstetric complications and PTB. IUT as a standalone therapy may be reasonable in selected cases. However, ideal candidates for this approach and the best management strategies remain to be determined. © 2026 International Society of Ultrasound in Obstetrics and Gynecology.", "journal": "Ultrasound O&G", "date": "2026-05-03", "authors": ["Schenone C V", "Fishman S J", "Kim H B", "Odibo A", "Shamshirsaz A A", "Krispin E"], "topics": ["אונקוגינקולוגיה", "רפואת אם-עובר"], "pub_types": ["Journal Article", "Systematic Review", "Review"], "importance": 90, "breakdown": {"design": 100, "journal": 80, "recency": 81, "total": 90.2}, "doi": "10.1002/uog.70234", "analysis": null, "analysis_scope": null}, {"pmid": "41974150", "title": "Pembrolizumab plus weekly paclitaxel in platinum-resistant recurrent ovarian cancer (ENGOT-ov65/KEYNOTE-B96): a multicentre, randomised, double-blind, phase 3 study.", "abstract": "BACKGROUND: Epithelial ovarian cancer frequently recurs and becomes resistant to platinum chemotherapy. We investigated whether adding pembrolizumab to weekly paclitaxel, with or without bevacizumab, improves progression-free survival and overall survival compared with weekly paclitaxel, with or without bevacizumab, in participants with platinum-resistant recurrent ovarian cancer who had received one to two previous systemic regimens.\nMETHODS: ENGOT-ov65/KEYNOTE-B96 is a randomised, double-blind, phase 3 study conducted at 187 gynaecologic oncology centres in 25 countries in the Americas, Asia, Europe, and Oceania. Adults (≥18 years) with histologically confirmed epithelial ovarian, fallopian tube, or primary peritoneal carcinoma, who received one to two previous systemic therapies including at least one platinum regimen and who progressed 6 months or less after the last platinum regimen, were eligible. Participants were randomly assigned 1:1 to intravenous pembrolizumab 400 mg every 6 weeks for up to 18 cycles plus open-label intravenous paclitaxel 80 mg/m2 on days 1, 8, and 15 of each 21-day cycle or intravenous placebo (saline solution) every 6 weeks for up to 18 cycles plus open-label intravenous paclitaxel 80 mg/m2 on days 1, 8, and 15 of each 21-day cycle; intravenous bevacizumab 10 mg/kg every 2 weeks was permitted per investigator. Randomisation was stratified by planned bevacizumab use, region, and PD-L1 combined positive score (CPS). The primary endpoint was investigator-assessed progression-free survival per RECIST version 1.1; the key secondary endpoint was overall survival. Results from two interim analyses and the final analysis are included in this Article. This study is registered with ClinicalTrials.gov, NCT05116189, and is now completed.\nFINDINGS: Between Dec 13, 2021, and July 3, 2023, 643 female participants were randomly assigned; 322 to pembrolizumab plus paclitaxel and 321 to placebo plus paclitaxel. At the first interim analysis, pembrolizumab plus paclitaxel significantly improved progression-free survival versus placebo plus paclitaxel in both the PD-L1 CPS 1 or higher (median 8·3 months vs 7·2 months; hazard ratio [HR] 0·72; 95% CI 0·58-0·89; p=0·0014 α=0·012]) and overall populations (median 8·3 months vs 6·4 months; HR 0·70, 95% CI 0·58-0·84; p<0·0001, [α=0·0023]), meeting the prespecified criteria for confirmatory efficacy. At the second interim analysis, overall survival was significantly improved in the PD-L1 CPS 1 or higher population (median 18·2 months vs 14·0 months; HR 0·76, 95% CI 0·61-0·94; p=0·0053, [α=0·0083]). At the final analysis, overall survival was significantly improved in the overall population (median 17·7 months vs 14·0 months; HR 0·82, 95% CI 0·69-0·97; p=0·011 [α=0·024]). Grade 3 or worse treatment-related adverse events occurred in 217 (68%) of 320 participants in the pembrolizumab plus paclitaxel group versus 176 (55%) of 318 participants in the placebo plus paclitaxel group. The most common treatment-related adverse events (any grade) included anaemia, peripheral neuropathy, alopecia, fatigue, and nausea. Treatment-related adverse events resulted in death in four participants (1%) in the pembrolizumab plus paclitaxel group (colitis, interstitial lung disease, acute myeloid leukaemia, and intestinal perforation) and in five participants (2%) in the placebo plus paclitaxel group (cardiac failure, intestinal perforation [in two participants], and large-intestine perforation [in two participants]).\nINTERPRETATION: Pembrolizumab plus weekly paclitaxel, with or without bevacizumab, significantly improved progression-free survival and overall survival in participants with platinum-resistant recurrent ovarian cancer who had received one to two previous systemic regimens, supporting this regimen as a new treatment option for this population.\nFUNDING: Funded by Merck Sharp & Dohme LLC, a subsidiary of Merck & Co, Inc, Rahway, NJ, USA.", "journal": "Lancet", "date": "2026-04-10", "authors": ["Colombo Nicoletta", "Zsiros Emese", "Parma Gabriella", "Rulli Eliana", "Sebastianelli Alexandra", "Bidzinski Mariusz", "Gallardo Carlos", "Matanes Emad", "Hasegawa Kosei", "Kose Fatih", "Magallanes-Maciel Manuel", "Herbertson Rebecca A", "Ananda Sumitra", "Kroep Judith R", "de Melo Andreia Cristina", "Debruyne Philip R", "Kim Jae-Weon", "Sehouli Jalid", "Pierre Marc-Edy", "Hietanen Sakari", "Zamagni Claudio", "Lu Xin", "Monk Bradley J", "Coleman Robert L", "Peng Xuan", "Yamada Karin", "Bogusz Agata M", "De La Motte Rouge Thibault", "Wu Xiaohua"], "topics": ["אונקוגינקולוגיה"], "pub_types": ["Journal Article", "Clinical Trial, Phase III", "Randomized Controlled Trial", "Multicenter Study"], "importance": 89, "breakdown": {"design": 90, "journal": 100, "recency": 71, "total": 89.1}, "doi": "10.1016/S0140-6736(26)00602-1", "analysis": null, "analysis_scope": null}, {"pmid": "41974149", "title": "Overall survival with relacorilant and nab-paclitaxel in patients with platinum-resistant ovarian cancer (ROSELLA): a phase 3 randomised controlled trial.", "abstract": "BACKGROUND: Relacorilant is a selective glucocorticoid receptor antagonist that increases the sensitivity of many cancer cell types to chemotherapy. The efficacy and safety of relacorilant plus nab-paclitaxel were assessed in the phase 3 ROSELLA (GOG-3073, ENGOT-ov72, APGOT-Ov10, and LACOG-0223) trial; the combination showed significant improvement in progression-free survival among patients with platinum-resistant ovarian cancer compared with nab-paclitaxel monotherapy. Results of the final overall survival analysis are reported here.\nMETHODS: In this open-label phase 3 trial, patients were randomly assigned 1:1 to receive relacorilant (150 mg orally the day before, day of, and day after nab-paclitaxel infusion) plus nab-paclitaxel (80 mg/m2 intravenously on days 1, 8, and 15 of each 28-day cycle) or nab-paclitaxel monotherapy (100 mg/m2 intravenously on the aforementioned schedule). Patients, aged 18 years or older, with one to three lines of previous anticancer therapy and platinum-resistant disease (progression <6 months from their last dose of platinum) were eligible. The trial was conducted at 117 hospitals and community oncology centres in 14 countries across Australia, Europe, Latin America, North America, and South Korea. Progression-free survival, assessed by blinded independent central review, and overall survival (time from randomisation to death from any cause) were dual primary endpoints. Additional prespecified endpoints included safety, second progression-free survival (time from randomisation to disease progression on subsequent anticancer therapy or death due to any cause, whichever occurred first), and patient-reported outcomes. This trial is registered at ClinicalTrials.gov, NCT05257408, and is ongoing.\nFINDINGS: Between Jan 5, 2023, and April 8, 2024, 381 patients were randomly assigned to the relacorilant combination group (n=188) or the nab-paclitaxel monotherapy group (n=193). All patients had received bevacizumab; 167 (44%) had received three previous lines of therapy, and 234 (61%) had received a poly(ADP-ribose) polymerase inhibitor. At a median follow-up of 24·8 months (95% CI 23·6-25·7), the addition of relacorilant to nab-paclitaxel resulted in a statistically and clinically significant improvement in overall survival compared with nab-paclitaxel monotherapy (hazard ratio for death 0·65 [95% CI 0·51-0·83]; p=0·0004); 18-month overall survival was 46% and 27%, respectively. The median overall survival in the relacorilant combination group was extended by 4·1 months compared with the nab-paclitaxel monotherapy group (16·0 [95% CI 13·0-18·3] vs 11·9 months [10·0-13·8]). Subsequent anticancer treatments were similar across study groups. Adverse events were similar in both groups when adjusted for duration of study treatment. Neutropenia (121 [64%]), anaemia (115 [61%]), fatigue (101 [54%]), and nausea (82 [44%]) were the most common adverse events in the relacorilant combination group. No new safety signals were observed with additional follow-up since the primary analysis.\nINTERPRETATION: The addition of relacorilant to nab-paclitaxel led to significantly longer overall survival in patients with platinum-resistant ovarian cancer, without the need for biomarker selection. The findings support relacorilant plus nab-paclitaxel as a potential new standard treatment option for patients with platinum-resistant ovarian cancer.\nFUNDING: Corcept Therapeutics.", "journal": "Lancet", "date": "2026-04-10", "authors": ["Lorusso Domenica", "Gladieff Laurence", "O'Malley David M", "Kim Jae-Weon", "Garbaos Gabriel", "Fagotti Anna", "Gilbert Lucy", "Mileshkin Linda", "Quesada Stanislas", "Hopp Elizabeth", "Lee Yong Jae", "Oaknin Ana", "Scaranti Mariana", "Kim Byoung-Gie", "Clamp Andrew", "Prillaman Christina", "Diakos Connie", "Bagaméri Andrea", "Leiser Aliza L", "Salutari Vanda", "Monk Bradley J", "Follana Philippe", "McClung Emily", "Carbone Vittoria", "Slomovitz Brian", "Giudice Elena", "Cannizzaro Maria Chiara", "Gavoille Laurène", "Devaux Alix", "Scollo Paolo", "Scandurra Giuseppa", "Cassani Chiara", "Artioli Grazia", "Van Gorp Toon", "Santaballa Ana", "Dreiling Lyndah K", "Kesner-Hays Amanda", "Tudor Iulia Cristina", "Jubb Adrian M", "Colombo Nicoletta", "Olawaiye Alexander B"], "topics": ["אונקוגינקולוגיה"], "pub_types": ["Journal Article", "Randomized Controlled Trial", "Clinical Trial, Phase III", "Multicenter Study"], "importance": 89, "breakdown": {"design": 90, "journal": 100, "recency": 71, "total": 89.1}, "doi": "10.1016/S0140-6736(26)00462-9", "analysis": null, "analysis_scope": null}, {"pmid": "42096713", "title": "Intrauterine Balloon Tamponade Duration for Postpartum Hemorrhage: A Randomized Controlled Trial.", "abstract": "OBJECTIVE: To determine whether an intrauterine balloon tamponade duration of 6 hours is noninferior to a duration of 18 hours for controlling bleeding after vaginal delivery, as measured by quantitative blood loss.\nMETHODS: In this pragmatic randomized trial of noninferiority, a 6-hour duration of intrauterine balloon tamponade usage for postpartum hemorrhage (PPH) control was compared with an 18-hour duration. We randomized participants with PPH due to uterine atony after vaginal delivery to an intrauterine balloon tamponade duration of 6 hours or 18 hours in a 1:1 ratio using stratified block randomization based on quantitative blood loss at the time of intrauterine balloon tamponade placement. The primary outcome was the total quantitative blood loss from the placement of the intrauterine balloon tamponade to 18 hours postplacement. Sixty-four participants were estimated to be required to determine whether total quantitative blood loss between groups was above our chosen noninferiority margin of 250 mL. Noninferiority t tests were considered noninferior at P<.05. Secondary outcomes included measures of escalation in PPH management.\nRESULTS: From October 2020 through May 2023, we randomized 64 participants with a mean quantitative blood loss at time of intrauterine balloon tamponade placement of 2,133 mL, with 31 individuals placed in the 18-hour duration group and 33 placed in the 6-hour duration group. All received their assigned intervention; however, two participants were excluded due to protocol violation. Characteristics were similar between groups. The median (IQR) quantitative blood loss 18 hours after intrauterine balloon tamponade placement was 135.0 mL in the 18-hour group (81-184 mL) and 110.0 mL in the 6-hour group (60-172 mL) (P<.001). Intrauterine balloon tamponade was successful in treating all randomized participants, with no difference in secondary outcomes between groups.\nCONCLUSION: Intrauterine balloon tamponade usage for 6 hours was noninferior to 18 hours of usage for mitigating blood loss after vaginal delivery PPH. It may be reasonable to remove an intrauterine balloon tamponade after 6 hours.\nCLINICAL TRIAL REGISTRATION: ClinicalTrials.gov, NCT04467996.", "journal": "Green Journal", "date": "2026-05-07", "authors": ["Larrea Nicole", "Adkins Katlynn", "Durfee Joshua", "Heyborne Kent", "Schultz Claire"], "topics": ["סיבוכי הריון", "לידה ומיילדות"], "pub_types": ["Journal Article"], "importance": 88, "breakdown": {"design": 90, "journal": 90, "recency": 83, "total": 88.5}, "doi": "10.1016/j.bpobgyn.2008.08.004", "analysis": null, "analysis_scope": null}, {"pmid": "41982049", "title": "Integrating Social and Clinical Determinants of Pre-Eclampsia: A Hierarchical Systematic Review and Conceptual Framework for Prevention.", "abstract": "BACKGROUND: Pre-eclampsia is a leading cause of maternal and perinatal morbidity and mortality, with risk factors reported across a vast literature base fragmented between social and clinical factors.\nOBJECTIVE: To develop a comprehensive conceptual framework of the strongest risk factors and their relationships contributing to pre-eclampsia incidence.\nSEARCH STRATEGY: Medline, Embase, Health Technology Assessments and Database of Abstracts of Reviews of Effects, Cochrane Library were searched.\nSELECTION CRITERIA: Reviews, randomized controlled trials and cohort studies (> 1000 participants), reporting social and clinical factors associated with pre-eclampsia were included.\nDATA COLLECTION AND ANALYSIS: The strongest factors, defined as those with at least moderate strength of association and quality of evidence using GRADE, were compiled from our previously published individual frameworks to create a combined conceptual framework. Indirect associations were searched and the strongest indirect factors were added.\nMAIN RESULTS: The conceptual framework integrated 35 social and clinical determinants of pre-eclampsia. Key modifiable factors included BMI, interlinked with chronic hypertension/elevated blood pressure in early pregnancy, type 2 diabetes mellitus, and obstructive sleep apnoea, as well as antenatal care attendance, interconnected with maternal/work stress and prenatal micronutrient supplementation. Other modifiable factors included smoking, antiphospholipid syndrome, infection, exposure to occupational hazards, distance to health facility, maternal heat exposure in early gestation, and UV-B exposure.\nCONCLUSION: There are strong social factors alongside clinical factors associated with pre-eclampsia incidence. Interwoven relationships between factors highlight the multifactorial aetiology of pre-eclampsia. Many determinants were potentially modifiable, which provides actionable intervention points for clinical care and public health strategies.", "journal": "BJOG", "date": "2026-04-14", "authors": ["Woo Kinshella Mai Lei", "Bone Jeffrey N", "Elawad Terteel", "Mistry Hiten D", "Poye Laney", "Tsigas Eleni", "Devadas Deepika", "Mateljan Violet", "Volvert Marie-Laure", "Vidler Marianne", "Blencowe Hannah", "Filippi Véronique", "Magee Laura A", "von Dadelszen Peter"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article"], "importance": 88, "breakdown": {"design": 100, "journal": 80, "recency": 72, "total": 88.5}, "doi": "10.1111/1471-0528.70240", "analysis": null, "analysis_scope": null}, {"pmid": "42220314", "title": "Awaiting results of the TRUFFLE-2 randomized controlled trial: what are the expectations among investigators?", "abstract": "", "journal": "Ultrasound O&G", "date": "2026-06-01", "authors": ["Stampalija T", "Butera G", "Hecher K", "Lees C"], "topics": ["כללי / לא מסווג"], "pub_types": ["Letter"], "importance": 88, "breakdown": {"design": 90, "journal": 80, "recency": 95, "total": 88.1}, "doi": "10.1002/uog.70253", "analysis": null, "analysis_scope": null}, {"pmid": "41956059", "title": "Retinal imaging in gestational diabetes mellitus: systematic review.", "abstract": "OBJECTIVE: To examine the differences in retinal structure and vasculature between women with gestational diabetes mellitus (GDM) and normoglycemic pregnant controls.\nMETHODS: This was a systematic review of the available literature on retinal assessment in pregnancies with GDM compared with non-GDM controls, conducted in PubMed, EMBASE via Ovid, The Cochrane Library and Scopus databases in November 2025, following an a-priori designed and prospectively registered protocol. Studies examining the retina using any non-interventional method of retinal assessment in women with GDM compared to non-GDM controls were identified. Potentially eligible studies included prospective and retrospective cohort, case-control and population-based studies, as well as randomized controlled trials. The Risk Of Bias In Non-randomized Studies of Interventions version 2 (ROBINS-I V2) tool was used to evaluate the risk of bias of the included studies. A meta-analysis was not performed due to considerable heterogeneity in the reported methods of retinal assessment, retinal parameters examined, disease severity, diagnostic criteria for GDM and gestational age at the time of retinal examination.\nRESULTS: The electronic database search yielded 1326 results, of which 21 were eligible for full-text review and nine were included. Following citation screening for additional eligible studies, 10 studies were ultimately included in the systematic review. The methods of retinal assessment utilized in the included studies were cross-sectional and structural optical coherence tomography (OCT), optical coherence tomography angiography (OCTA) and retinal fundus photography. Each method examined various retinal structural and vascular parameters. Studies examining retinal vascular metrics using retinal fundus photography and cross-sectional OCT found similar retinal arteriolar parameters, increased retinal venular parameters and a reduced retinal arteriovenous ratio in women with GDM compared with normoglycemic controls. Studies utilizing structural OCT reported that the retinal nerve fiber layer (RNFL) thickness was decreased or similar in women with GDM vs non-GDM controls. Combinations of the ganglion cell layer (GCL) thickness, inner plexiform layer thickness and macular RNFL thickness were found to be lower in women with GDM. All studies reporting on other OCT parameters (acircularity index and retinal, macular and GCL thickness) found them to be similar between the two groups. The superficial and deep capillary plexus vessel densities, assessed using OCTA, were reported to be lower in women with GDM in some studies, whereas others found no significant difference between the two groups. For the remaining OCTA parameters (choriocapillaris vessel density, outer retinal vessel density, whole-image vessel density, foveal avascular zone area, foveal density and choriocapillaris flow area), no study identified significant differences between women with GDM and non-GDM controls. The ROBINS-I V2 tool found the risk of bias to be serious in six studies and moderate in four studies.\nCONCLUSION: Existing studies provide inconsistent evidence to clearly establish retinal structural or functional changes in pregnancies complicated by GDM. Future large-scale prospective studies are required to confirm these findings and evaluate whether the retinal changes observed in GDM persist postpartum. Such evidence may clarify their potential role as biomarkers of cardiovascular insult severity and inform stratified surveillance. © 2026 The Author(s). Ultrasound in Obstetrics & Gynecology published by John Wiley & Sons Ltd on behalf of International Society of Ultrasound in Obstetrics and Gynecology.", "journal": "Ultrasound O&G", "date": "2026-04-09", "authors": ["Kitmiridou D", "Mitrogiannis I", "Charakida M", "Nicolaides K H"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article", "Systematic Review", "Review"], "importance": 88, "breakdown": {"design": 100, "journal": 80, "recency": 70, "total": 88.1}, "doi": "10.1002/uog.70218", "analysis": null, "analysis_scope": null}, {"pmid": "42025715", "title": "A randomized controlled trial comparing remote blood pressure monitoring with office-based blood pressure monitoring for women at high risk of preeclampsia.", "abstract": "BACKGROUND: Women at high risk for developing preeclampsia are recommended to have additional blood pressure surveillance, but frequent outpatient attendances are demanding for patients and the healthcare system. It is unclear whether remote blood pressure monitoring can replace conventional office-based monitoring and improve healthcare utilisation without increasing the signal for harm.\nOBJECTIVE: To evaluate the effects of substituting clinic blood pressure monitoring with remote blood pressure monitoring on fetal and maternal outcomes, and healthcare utilisation, in pregnant women at high risk of developing preeclampsia.\nSTUDY DESIGN: Unblinded, non-inferiority, multicentre randomized controlled trial, with recruitment between July 2022 and February 2024 from 3 metropolitan hospitals in Australia. Participants were pregnant women at high-risk of developing preeclampsia based on clinical risk factors or combined first trimester screening tests, who are routinely referred to a specialist hypertension service for extra blood pressure surveillance, in addition to standard antenatal care. Women randomised to usual care attended these specialist hypertension clinics in-person, with frequency of appointments dictated by clinical need. Women randomised to remote blood pressure monitoring, in addition to receiving routine antenatal care, measured their own blood pressure using an automated blood pressure machine with data transmitted via a smartphone application for specialist review. The primary outcome was a perinatal composite of adverse events of at least one of perinatal loss, high-level neonatal care for over 48 hours or a small-for-gestational age baby (<10th centile for fetal weight). The primary outcome was assessed in the intention-to-treat population. The trial was prospectively registered with the Australian and New Zealand Clinical Trials Registry (ACTRN12620001049965p).\nRESULTS: 270 women were included in the final analysis (intervention n=132, usual care n=138; mean age 34, 60.4% from a self-reported non-Caucasian ethnic group). There was no difference in the primary outcome [hazard ratio (HR) 1.0, 95%CI 0.57-1.76; p=0.99]. There was also no difference in secondary fetal and maternal outcomes. The intervention group had fewer total antenatal attendances (median [inter-quartile range (IQR)]: 14 [10-17]) compared to usual care (16 [13-20]; p< 0.01), as well as fewer planned outpatient appointments (median [IQR]: 10 [8-12] vs. 13 [10-16]; p<0.01), without an associated increase in unscheduled hospital presentations. Women undertaking remote blood pressure monitoring were less likely to be admitted to hospital for any cause [HR 0.54, 95% confidence interval (CI) 0.30-0.97; p=0.04], as well as specifically for hypertension [HR 0.41, 95%CI 0.19-0.88, p=0.02]. More antihypertensive prescriptions filled per patient in the intervention arm compared to usual care (median [IQR]: 5 [3-9] vs. 3 [2-5]; p<0.01).\nCONCLUSIONS: Compared to usual care, remote blood pressure monitoring reduced antenatal outpatient appointments and the likelihood of inpatient admissions, without increasing adverse fetal and maternal outcomes. Women undertaking remote monitoring were also more likely to fill antihypertensive medication scripts.", "journal": "AJOG", "date": "2026-04-21", "authors": ["Rajkumar Theepika", "Hennessy Annemarie", "Shanmugalingam Renuka", "You Wenpeng", "Canty Alison", "Pickup Wendy", "Potter Daniela", "Butten Kaley", "Varnfield Marlien", "Makris Angela"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article"], "importance": 87, "breakdown": {"design": 90, "journal": 90, "recency": 75, "total": 87.1}, "doi": "10.1016/j.ajog.2026.04.025", "analysis": null, "analysis_scope": null}, {"pmid": "42137913", "title": "Vaginal Hysterectomy Versus Vaginal Assisted Natural Orifice Transluminal Endoscopic Surgery Hysterectomy; Results of a Randomised Controlled Trial.", "abstract": "OBJECTIVE: To compare Vaginal Hysterectomy (VH) with Vaginal Assisted Natural Orifice Transluminal Endoscopic Surgery (NOTES) hysterectomy (VANH) as a day-care procedure.\nDESIGN: Single-blind, multicentre randomised controlled trial.\nSETTING: Two Dutch non-academic teaching hospitals.\nPOPULATION: Women aged ≥ 18 years undergoing hysterectomy for benign indications.\nMETHODS: Women were randomised 1:2 (VH or VANH). Primary outcome was SDD. Secondary outcomes included operative time, rate of elective salpingectomies, intraoperative blood loss, complications (Clavien-Dindo), pain scores (NRS) and analgesic use, post-operative recovery (RI-10), and quality of life (EQ-5D-5L). Analyses were performed on an intention-to-treat basis.\nRESULTS: A total of 113 patients were included in the analyses (n = 42 VH, and n = 71 VANH). SDD occurred significantly more frequently in the VANH group (87.3%) than VH group (71.4%; OR 2.76, 95% CI 1.04-7.25; p = 0.04). VANH was associated with a significantly shorter operative time (median 55 min versus 65 min; p = 0.005), less blood loss (median 50 mL vs. 150 mL; p < 0.001) and more often elective opportunistic salpingectomy compared to VH (100% vs. 77.4%; p = 0.008). NRS were significantly lower in the VANH group the first hour post-operative (3 vs. 1, p < 0.001). Post-operative complications (VH 9.5% vs. VANH 15.5%; p = 0.34), readmission (VH 4.8% vs. VANH 8.5%; p = 0.47), analgesic use, recovery, and quality of life were not statistically significant.\nCONCLUSIONS: VANH is a safe and effective alternative to VH, offering a higher likelihood of SDD, shorter operative time, reduced blood loss, and more often an elective salpingectomy, without increased complications or differences in pain, recovery, or quality of life.", "journal": "BJOG", "date": "2026-05-15", "authors": ["Bekkers Ilse P W", "Wintraecken Floor R M", "Smeets Nicol A C", "Damoiseaux Anne", "Maas Jacques W M", "van Vliet Huib A A M", "Wassen Martine M L H"], "topics": ["גינקולוגיה כללית/ניתוחית"], "pub_types": ["Journal Article"], "importance": 86, "breakdown": {"design": 90, "journal": 80, "recency": 87, "total": 86.3}, "doi": "10.1111/1471-0528.70260", "analysis": null, "analysis_scope": null}, {"pmid": "41967741", "title": "Methodological considerations in randomized trial of third trimester ultrasound screening (reply to letter to the editor).", "abstract": "", "journal": "AJOG", "date": "2026-04-10", "authors": ["Familiari Alessandra", "Ferrazzi Enrico", "Ghi Tullio"], "topics": ["רפואת אם-עובר"], "pub_types": ["Letter"], "importance": 86, "breakdown": {"design": 90, "journal": 90, "recency": 71, "total": 86.1}, "doi": "10.1016/j.ajog.2026.04.009", "analysis": null, "analysis_scope": null}, {"pmid": "41967740", "title": "Prolapse phenotypes and 12-month postoperative prolapse recurrence after apical native tissue surgery: a combined analysis using multicenter randomized trials and registry data.", "abstract": "BACKGROUND: Recurrence after pelvic organ prolapse surgery is not uncommon, and recurrence rates differ based on baseline prolapse characteristics, such as genital hiatus size and prolapse stage. Better understanding the relationship between anatomic prolapse subgroups and surgical outcomes may allow surgeons to individualize treatment decisions and improve outcomes. Clinically relevant prolapse phenotypes (subgroups) defined using the Pelvic Organ Prolapse Quantification system were previously identified. Therefore, study associations between these phenotypes and surgical outcomes in a large, prospectively collected dataset are sought.\nOBJECTIVE: The primary aim of this study was to determine the association between a novel system of phenotyping prolapse and prolapse symptom recurrence 12 months postoperatively in women who underwent vaginal native-tissue apical prolapse surgery. Different prolapse phenotypes that would have different risks of prolapse recurrence were hypothesized. The secondary aims of the study were to determine the associations between the phenotypes and anatomic prolapse recurrence and new-onset stress urinary incontinence.\nSTUDY DESIGN: This was a secondary analysis of data combined from 3 multicenter randomized trials and 1 prospective, multicenter patient registry. Participants from these studies who underwent uterosacral ligament suspension or sacrospinous ligament fixation without mesh and had 12-month follow-up data were included and categorized into 1 of 8 phenotypes based on the Pelvic Organ Prolapse Quantification system: (1) no prolapse (n=5, excluded), (2) isolated anterior, (3) isolated posterior, (4) isolated apical, (5) anterior and posterior, (6) anterior-predominant and apical, (7) posterior-predominant and apical, and (8) anterior and posterior and apical. The primary outcome was symptomatic recurrence 12 months after surgery, which was defined as a positive response to the Pelvic Floor Distress Inventory \"bulge\" question with at least \"somewhat\" bother. Univariate and multivariate logistic regression analyses (adjusted for prolapse stage [stage II vs stage III/IV] and previous hysterectomy) were developed for each outcome.\nRESULTS: Of 704 participants, most (473 [67.2%]) had anterior-predominant and apical prolapse (used as the reference group), followed by the anterior and posterior and apical (101 [14.3%]) and isolated apical (45 [6.4%]) phenotypes. Overall, 184 patients (26.1%) had sacrospinous ligament fixation, 520 patients (73.9%) had uterosacral ligament suspension, and 454 patients (64.5%) had midurethral slings. Overall, symptomatic prolapse recurrence occurred in 65 patients (9.2%), ranging from 0.0% to 29.0% across phenotype groups, and was particularly uncommon in the isolated posterior (0.0%) and isolated apical (2.2%: 1 participant) phenotypes. However, the phenotype group was not significantly associated with symptomatic recurrence in univariate or multivariate analysis. Hispanic ethnicity (odds ratio, 2.25 [95% confidence interval, 1.17-4.35]; P=.015), private insurance (odds ratio, 0.58 [95% confidence interval, 0.35-0.98]; P=.042), and vaginal parity (odds ratio, 1.19 [95% confidence interval, 1.02-1.40]; P=.030) were significantly associated with recurrence. Similarly, the phenotype was not significantly associated with anatomic recurrence or new or worsening stress urinary incontinence.\nCONCLUSION: Prolapse Pelvic Organ Prolapse Quantification phenotypes were not associated with symptomatic recurrence after native tissue repair surgery. Most women who underwent native tissue apical prolapse surgery have anterior-predominant and apical prolapse. Larger studies may be needed to identify differences in outcomes among less common phenotype groups.", "journal": "AJOG", "date": "2026-04-10", "authors": ["Weston Katherine", "Kenne Kimberly A", "Bradley Catherine S", "Wendt Linder", "Kowalski Joseph T"], "topics": ["רצפת אגן ואורוגינקולוגיה", "גינקולוגיה כללית/ניתוחית"], "pub_types": ["Journal Article"], "importance": 86, "breakdown": {"design": 90, "journal": 90, "recency": 71, "total": 86.1}, "doi": "10.1016/j.ajog.2026.04.012", "analysis": null, "analysis_scope": null}, {"pmid": "41955620", "title": "Nitrous Oxide for Pain Management in Office Hysteroscopy: A Randomized Placebo-Controlled Trial.", "abstract": "OBJECTIVE: To assess pain during office operative hysteroscopy with or without inhaled nitrous oxide (N2O).\nMETHODS: A prospective, randomized, double-blind, placebo-controlled trial was conducted at a single university-affiliated tertiary care hospital. Women undergoing office operative hysteroscopy were randomized in 1:1 ratio to receive either inhaled N2O or ambient air through a self-administered face mask. Pain was assessed using a 10-point visual analog scale at three timepoints: uterine entry, during the procedure, and postprocedure.\nRESULTS: Between July and November 2025, a total of 214 women were randomized to receive either N2O (n=110) or ambient air (n=104). Baseline demographics and procedural characteristics were comparable between groups. Intraprocedural pain was significantly lower in the N2O group (2.23±3.29 vs 3.96±3.31, P<.001). Among postmenopausal women, the analgesic effect of N2O was more pronounced, with significantly lower pain both at uterine entry (5.47±3.38 vs 8.00±2.72, P=.013) and during the procedure (2.42±3.86 vs 6.56±2.79, P=.002). Procedure completion rates were higher in the N2O group (93.6% vs 83.7%, P=.021), and patient satisfaction was significantly greater (80.9% vs 47.1%, P<.001).\nCONCLUSION: Inhaled N2O significantly reduces pain during office operative hysteroscopy, improves patient satisfaction, and decreases the rate of incomplete procedures, with a low incidence of adverse events. These findings support its use as an effective and well-tolerated analgesic option for outpatient hysteroscopic procedures.\nCLINICAL TRIAL REGISTRATION: ClinicalTrials.gov, NCT07074795.", "journal": "Green Journal", "date": "2026-04-09", "authors": ["Razdolsky Sabina", "Yaniv-Tamir Rina", "Raz Merav", "Kolp-Asis Shanny", "Katz Tova", "Elbaz Loren", "Tzur Tamar"], "topics": ["הפרעות מחזור והורמונים"], "pub_types": ["Journal Article"], "importance": 86, "breakdown": {"design": 90, "journal": 90, "recency": 70, "total": 86.1}, "doi": "10.1007/s12325-020-01297-y", "analysis": null, "analysis_scope": null}, {"pmid": "42116589", "title": "Efficacy and Safety of Elagolix Versus Dienogest for Treatment of Moderate-to-Severe Endometriosis Pain: A Phase III, Multicentric, Double-Blind, Active-Controlled, Non-Inferiority Study.", "abstract": "OBJECTIVE: To compare the efficacy, safety and tolerability of elagolix with dienogest in women with moderate-to-severe endometriosis-associated pain.\nDESIGN: A multicentre, double-blind, double-dummy, randomised, parallel-group, active-controlled, non-inferiority phase III study.\nSETTING: Nineteen clinical centres across India.\nSTUDY POPULATION: Women (18-49 years) diagnosed with endometriosis and experiencing moderate-to-severe pain.\nMETHODS: Participants were randomised (1:1) to receive oral elagolix (150 mg once daily) or dienogest (2 mg once daily) for 24 weeks.\nOUTCOME MEASURES: The primary outcome was change in endometriosis-related pain (Numeric Rating Scale [NRS]) from baseline to Day 85. Secondary outcomes included changes in NRS (Day 169), dysmenorrhoea, non-menstrual pelvic pain (NMPP) scores (Days 85 and 169), rescue medication use, patient global impression of change (PGIC), adverse events and bone mineral density.\nRESULTS: Of 340 patients screened, 230 were randomised (115 per group). At Day 85, both arms showed similar reductions in NRS pain scores with a treatment difference of 0.04 (95% CI: -0.3, 0.37) [p = 0.9747] demonstrating non-inferiority as upper 95% CI was below pre-specified margin of 1.5. At Day 169, both arms showed comparable improvements in overall pain, dysmenorrhoea and NMPP from baseline (p = 0.9372, p = 0.8884, and p = 0.9616, respectively). Rescue medication use and PGIC were comparable between treatment arms. Adverse event incidence was similar (elagolix: 14.8%; dienogest: 19.1%), with no serious TEAEs or discontinuations. No significant bone mineral density changes were observed.\nCONCLUSIONS: Elagolix demonstrated non-inferiority to dienogest with an acceptable safety and tolerability profile, supporting its use in managing endometriosis-associated pain.\nTRIAL REGISTRATION: ClinicalTrials.gov identifier: CTRI/2023/01/049292.", "journal": "BJOG", "date": "2026-05-11", "authors": ["Bhoir Sneha", "Patel Jaldhara", "Palve Tushar", "Dash Mrinal Kanti", "Saigal Sweety", "Kamilya Gourisankar", "Srivastava Shalini", "Savalia Kartikbhai", "Gupta Tanusree", "Choudhary Deepa", "Rangaswamy Manohar", "Bhatt Vidya V", "Gupta Neena", "Ponnuru Malathi", "Shah Parul", "Shetty Apurva", "Saha Shruti", "Quadros Reshma", "Pandit Sucheta", "Patil Dipak", "Patel Piyush", "Ghadge Pravin", "Lakhwani Lalit", "Mehta Suyog", "Joglekar Sadhana"], "topics": ["אנדומטריוזיס וכאב אגן"], "pub_types": ["Journal Article"], "importance": 86, "breakdown": {"design": 90, "journal": 80, "recency": 85, "total": 85.9}, "doi": "10.1111/1471-0528.70256", "analysis": null, "analysis_scope": null}, {"pmid": "41999106", "title": "Effects of Mediterranean diet and stress-reduction interventions during pregnancy on fetal brain development detected using magnetic resonance imaging.", "abstract": "OBJECTIVE: To assess whether lifestyle interventions based on Mediterranean diet or stress reduction during pregnancy are associated with differences in fetal brain development detectable by two-dimensional magnetic resonance imaging (MRI) in a high-risk population for small-for-gestational-age neonates.\nMETHODS: This was a secondary analysis of the randomized controlled clinical trial, Improving Mothers for a better PrenAtal Care Trial BarCeloNa (IMPACT BCN), which enrolled 1221 singleton pregnancies at high-risk for a small-for-gestational-age neonate between February 2017 and March 2020. At midgestation, participants were randomly allocated into three groups: a Mediterranean diet intervention; a stress-reduction program; or usual care. A randomly selected subgroup (n = 124) underwent fetal brain MRI between 36.1 and 39.1 weeks' gestation and were analyzed offline. Offline analysis included measurements of biparietal diameter, occipitofrontal diameter, cortical sulci depth, corpus callosum length, vermis height and cerebellar transverse diameter. Differences in brain measurement between groups were analyzed by regression models adjusted for baseline maternal characteristics, gestational age at MRI assessment, fetal sex, fetal head size and MRI scanner model.\nRESULTS: Fetuses in the Mediterranean-diet group (n = 36) showed a significantly deeper right insula (mean ± SD, 28.78 ± 1.16 mm vs 27.88 ± 1.23 mm; P = 0.03), a deeper left insula (mean ± SD, 28.60 ± 1.21 mm vs 27.49 ± 1.26 mm; P = 0.01) and a longer corpus callosum (mean ± SD, 42.24 ± 2.50 mm vs 40.61 ± 2.13 mm; P < 0.01) compared with fetuses in the usual-care group (n = 44). Fetuses in the stress-reduction group (n = 44) also had a deeper left insula (mean ± SD, 28.39 ± 1.13 mm vs 27.49 ± 1.26 mm; P = 0.04) compared with those in the usual-care group.\nCONCLUSION: Structured maternal lifestyle interventions during pregnancy may influence fetal neurodevelopment. Although the effect sizes were submillimetric, these effects were detectable using two-dimensional MRI, which highlights its potential as a sensitive tool for detecting subtle brain changes during fetal life. Future studies are warranted to truly reveal the clinical meaning of these findings. © 2026 International Society of Ultrasound in Obstetrics and Gynecology.", "journal": "Ultrasound O&G", "date": "2026-04-17", "authors": ["Nakaki A", "Gomez Y", "Marra M C", "Youssef L", "Castro-Barquero S", "Casas R", "Vieta E", "Estruch R", "Eixarch E", "Gratacos E", "Crispi F", "Crovetto F"], "topics": ["סיבוכי הריון", "רפואת אם-עובר"], "pub_types": ["Journal Article", "Randomized Controlled Trial", "Research Support, Non-U.S. Gov't"], "importance": 84, "breakdown": {"design": 90, "journal": 80, "recency": 74, "total": 83.7}, "doi": "10.1002/uog.70214", "analysis": null, "analysis_scope": null}, {"pmid": "42178785", "title": "Prospective comparison of diagnostic accuracy of ultrasound, PET/CT and DW-MRI for preoperative assessment of pelvic lymph nodes in cervical cancer patients: results of the CANNES trial.", "abstract": "OBJECTIVE: To determine whether ultrasound is non-inferior to positron-emission tomography/computed tomography (PET/CT) and diffusion-weighted magnetic resonance imaging (DW-MRI) in terms of overall diagnostic accuracy for the preoperative assessment of pelvic lymph-node status in cervical cancer.\nMETHODS: This prospective multicenter study reports the primary results of the CANNES trial (NCT05573451), which was conducted at three European gynecological oncology centers and included women with histopathologically confirmed cervical cancer (International Federation of Gynecology and Obstetrics Stage IA1 with lymphovascular space invasion to Stage IIIC2) who underwent ultrasound and PET/CT imaging, with optional DW-MRI, before surgery between January 2021 and December 2023. The diagnostic accuracy for detecting pelvic lymph-node macrometastases (maximum diameter, > 2 mm) was compared with final histopathology (primary reference standard). Furthermore, the diagnostic accuracy for detecting pelvic lymph-node metastases, including both micrometastases (maximum diameter, > 0.2 to ≤ 2 mm) and macrometastases, was compared with final histopathology, or postoperative imaging performed selectively in cases of discordance, specifically when radiologically positive lymph nodes contradicted negative histopathology (secondary reference standard). Sensitivity, specificity and diagnostic accuracy were calculated using the Clopper-Pearson exact method. The diagnostic accuracy of ultrasound for detecting pelvic lymph-node macrometastases and overall lymph-node metastases (including both micro- and macrometastases) was compared with that of PET/CT and that of DW-MRI using McNemar's test; non-inferiority was defined as the lower bound of the 95% CI for the difference in diagnostic accuracy being greater than -10%.\nRESULTS: During the study period, 141 patients were examined for suspicion of cervical cancer, of whom 120 were analyzed for pelvic lymph-node involvement. All patients underwent ultrasound and PET/CT imaging and 108 (90.0%) also underwent DW-MRI. Pelvic lymph-node macrometastases were confirmed at final histopathology in 29 (24.2%) patients, of whom seven had synchronous micrometastases. An additional seven (5.8%) patients had only micrometastases, resulting in a total of 36 (30.0%) patients with histologically confirmed nodal involvement. Postoperative imaging identified persistent nodal disease in two additional patients, yielding 38 (31.7%) patients with overall pelvic lymph-node involvement. Using the primary reference standard, the sensitivity, specificity and diagnostic accuracy for the detection of pelvic lymph-node macrometastases (per-patient analysis) were 79.3% (95% CI, 60.3-92.0%), 87.9% (95% CI, 79.4-93.8%) and 85.8% (95% CI, 78.3-91.5%), respectively, for ultrasound; 75.9% (95% CI, 56.5-89.7%), 86.8% (95% CI, 78.1-93.0%) and 84.2% (95% CI, 76.4-90.2%), respectively, for PET/CT; and 70.8% (95% CI, 48.9-87.4%), 90.5% (95% CI, 82.1-95.8%) and 86.1% (95% CI, 78.1-92.0%), respectively, for DW-MRI. Using the secondary reference standard, the sensitivity, specificity and diagnostic accuracy values for overall pelvic lymph-node involvement were 68.4% (95% CI, 51.3-82.5%), 90.2% (95% CI, 81.7-95.7%) and 83.3% (95% CI, 75.4-89.5%), respectively, for ultrasound; 65.8% (95% CI, 48.6-80.4%), 89.0% (95% CI, 80.2-94.9%) and 81.7% (95% CI, 73.6-88.1%), respectively, for PET/CT; and 66.7% (95% CI, 48.2-82.0%), 96.0% (95% CI, 88.8-99.2%) and 87.0% (95% CI, 79.2-92.7%), respectively, for DW-MRI. Ultrasound met the predefined non-inferiority margin for overall diagnostic accuracy compared with PET/CT and DW-MRI for both pelvic lymph-node macrometastases and overall pelvic lymph-node involvement.\nCONCLUSIONS: In this first prospective multicenter trial to directly compare ultrasound, PET/CT and DW-MRI for detecting pelvic nodal disease, ultrasound was non-inferior to PET/CT and DW-MRI in overall diagnostic accuracy, with comparable sensitivity. These findings support ultrasound as a widely accessible and reliable option for preoperative pelvic lymph-node assessment in cervical cancer. © 2026 The Author(s). Ultrasound in Obstetrics & Gynecology published by John Wiley & Sons Ltd on behalf of International Society of Ultrasound in Obstetrics and Gynecology.", "journal": "Ultrasound O&G", "date": "2026-05-24", "authors": ["Frühauf F", "Fischerová D", "Moro F", "Kocián R", "Ptáčník V", "Wagnerová M", "Lambert L", "Testa A C", "Bizzarri N", "Perez R O", "Teodorico E", "Cibula D"], "topics": ["אונקוגינקולוגיה", "רפואת אם-עובר"], "pub_types": ["Comparative Study", "Equivalence Trial", "Journal Article", "Multicenter Study", "Observational Study"], "importance": 72, "breakdown": {"design": 60, "journal": 80, "recency": 91, "total": 72.2}, "doi": "10.1002/uog.70241", "analysis": null, "analysis_scope": null}, {"pmid": "42076947", "title": "Changing trends in prenatal screening and treatment of cytomegalovirus infection in France: 7-year national cohort study (2017-2023).", "abstract": "OBJECTIVES: Cytomegalovirus (CMV) is the leading cause of congenital infectious neurosensory impairment. We aimed to present national epidemiological data on maternal CMV infection during pregnancy in France, focusing in particular on primary infection in the periconceptional period or first trimester, and to assess the impact of changes in screening practices and clinical management of affected pregnant women and their newborns.\nMETHODS: In this retrospective, multicenter study, we retrieved data from the electronic database of the French National Reference Center for Herpesviruses from cases of maternal CMV infection diagnosed during pregnancy between January 2017 and December 2023, with known neonatal infection status (infected or non-infected) at birth. Maternal, fetal and neonatal data in cases with maternal primary infection during the periconceptional period or first trimester were compared between the periods before and after publication of a pivotal randomized controlled trial (RCT) in September 2020 that demonstrated that valacyclovir reduced vertical transmission by two-thirds when administered to women with first-trimester primary CMV infection.\nRESULTS: Among 451 documented cases of maternal CMV infection during pregnancy with known fetal/newborn CMV status, there were 220 pregnancies (222 fetuses) with periconceptional or first-trimester primary maternal infection (PI), among which maternal-fetal transmission occurred in 176 (79.3%). Compared with the period from 2017 to 2020, in the period from 2021 to 2023 there was a significant increase in both systematic CMV screening (from 22.0% to 40.0%; P = 0.001) and maternal requests for testing (from 0% to 4.2%; P = 0.02). Among cases of maternal infection during the periconceptional period or in the first trimester, antiviral therapy (generally valacyclovir) was administered more frequently in the period from 2021 to 2023 (27.7% vs 59.8%; P < 0.0001). The overall rate of termination of pregnancy (TOP) for early maternal CMV-PI was 20.7% (40/193 with known pregnancy outcome), with significantly fewer TOPs being performed in the period from 2021 to 2023 (25.9% vs 13.0%; P = 0.03). Notably, women who did not receive valacyclovir treatment had higher rates of TOP overall compared with women who had received valacyclovir (22.1% vs 8.1%; P = 0.01).\nCONCLUSIONS: Congenital CMV infection is a major public health problem. Despite the lack of national guidelines for systematic maternal CMV screening until mid-2025, the uptake of maternal CMV screening and preventive treatment increased significantly in France after publication of the pivotal RCT in 2020, apparently without an associated rise in the rate of TOP. These findings support the safety and potential benefits of offering CMV serological testing during pregnancy, particularly in the context of evidence-based therapeutic options. © 2026 The Author(s). Ultrasound in Obstetrics & Gynecology published by John Wiley & Sons Ltd on behalf of International Society of Ultrasound in Obstetrics and Gynecology.", "journal": "Ultrasound O&G", "date": "2026-05-04", "authors": ["Coste-Mazeau P", "Ribot E", "Hantz S", "Ville Y", "Leruez-Ville M", "Alain S"], "topics": ["סיבוכי הריון", "רפואת אם-עובר"], "pu     list.sort((x,y)=>(order[x.journal]??99)-(order[y.journal]??99)||y.importance-x.importance);
    let html='',last=null,idx=0;
    list.forEach(a=>{if(a.journal!==last){html+=`<div class="jhead" style="border-color:${jColor(a.journal)}">${esc(a.journal)}</div>`;last=a.journal;}html+=cardHTML(a,idx++);});
    feed.innerHTML=html;
  } else { feed.innerHTML=list.map((a,i)=>cardHTML(a,i)).join(''); }
}
function populateTopics(){
  const set=new Set(); DATA.forEach(a=>(a.topics||[]).forEach(t=>set.add(t)));
  const sel=document.getElementById('topic');
  [...set].sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
}
function persist(){try{['window','perj','topic','sort'].forEach(id=>localStorage.setItem('lr_'+id,document.getElementById(id).value));localStorage.setItem('lr_view',viewMode);}catch(e){}}
function loadPrefs(){try{
  ['window','perj','topic','sort'].forEach(id=>{const v=localStorage.getItem('lr_'+id);if(v!==null&&[...document.getElementById(id).options].some(o=>o.value===v))document.getElementById(id).value=v;});
  const vw=localStorage.getItem('lr_view'); if(vw)setView(vw);
}catch(e){}}
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.id!=='q'){e.preventDefault();document.getElementById('q').focus();}
  if(e.key==='Escape'&&document.activeElement.id==='q'){document.getElementById('q').value='';render();}
});
// init
document.getElementById('window').value=String(META.default_window);
document.getElementById('perj').value=String(META.default_per_journal);
renderStats();populateTopics();renderLegend();loadPrefs();render();
</script>
</body>
