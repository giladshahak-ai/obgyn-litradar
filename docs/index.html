<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LitRadar · דייג'סט שבועי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f9; --card:#ffffff; --ink:#16203a; --muted:#69748c;
  --line:#e4e9f2; --brand:#2f6df6; --brand-2:#13b5b1; --soft:#eaf1ff;
  --hi:#15914a; --hi-bg:#e3f6ea; --mid:#b07a00; --mid-bg:#fcf3da; --lo:#5b6678; --lo-bg:#eef1f6;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);}
a{color:inherit;text-decoration:none}

/* hero */
.hero{background:linear-gradient(125deg,#2f6df6 0%,#5b8def 55%,#13b5b1 130%);color:#fff;padding:30px 0 70px;}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px;}
.hero h1{margin:0;font-size:30px;font-weight:900;letter-spacing:-.6px;display:flex;align-items:center;gap:10px}
.hero .sub{margin-top:8px;opacity:.95;font-size:15px;font-weight:400}
.hero .stats{margin-top:16px;display:flex;gap:22px;flex-wrap:wrap;font-size:13px;opacity:.95}
.hero .stats b{font-size:18px;display:block;font-weight:800}

/* toolbar */
.toolbar{max-width:1080px;margin:-44px auto 0;padding:14px 16px;background:#fff;border:1px solid var(--line);
  border-radius:16px;box-shadow:0 10px 30px rgba(20,30,70,.10);display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:sticky;top:10px;z-index:30}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:#f3f6fc;border:1px solid var(--line);border-radius:11px;padding:9px 13px}
.search input{border:0;background:transparent;outline:0;width:100%;font-family:inherit;font-size:14px;color:var(--ink)}
.sortsel{border:1px solid var(--line);border-radius:11px;padding:9px 12px;background:#fff;font-family:inherit;font-size:14px;color:var(--ink);cursor:pointer}
.seg{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.seg button{border:0;background:#fff;padding:9px 14px;font-family:inherit;font-size:13.5px;font-weight:600;color:#43506a;cursor:pointer;transition:.15s}
.seg button.on{background:var(--brand);color:#fff}
.jhead{max-width:1080px;margin:8px 0 2px;padding:6px 14px;font-weight:800;font-size:15px;color:#10243f;border-right:4px solid #10243f;background:#fff;border-radius:10px}

/* journal chips */
.chips{max-width:1080px;margin:14px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
.jchip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:#43506a}
.jchip:hover{border-color:var(--brand);color:var(--brand)}
.jchip.on{background:var(--brand);color:#fff;border-color:var(--brand)}

/* feed */
.feed{max-width:1080px;margin:18px auto 60px;padding:0 16px;display:grid;gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;
  box-shadow:0 2px 10px rgba(20,30,70,.04);transition:.18s;animation:rise .4s ease both}
.card:hover{box-shadow:0 14px 34px rgba(20,30,70,.10);transform:translateY(-2px)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card .head{display:flex;gap:16px;align-items:flex-start}
.ring{flex:none;width:62px;height:62px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:21px;line-height:1}
.ring small{font-size:9px;font-weight:600;opacity:.85;margin-top:2px}
.r-hi{background:var(--hi-bg);color:var(--hi);box-shadow:inset 0 0 0 2px var(--hi)}
.r-mid{background:var(--mid-bg);color:var(--mid);box-shadow:inset 0 0 0 2px var(--mid)}
.r-lo{background:var(--lo-bg);color:var(--lo);box-shadow:inset 0 0 0 2px #aeb8c8}
.ttl{display:block;font-size:18.5px;font-weight:700;line-height:1.45}
.ttl:hover{color:var(--brand)}
.meta{color:var(--muted);font-size:13px;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.jpill{background:#10243f;color:#fff;border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700}
.tags{margin-top:11px;display:flex;gap:6px;flex-wrap:wrap}
.tag{border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600}
.t-star{background:#fff2cc;color:#8a6a00}
.t-topic{background:var(--soft);color:#274aa8}
.actions{margin-top:14px;display:flex;gap:9px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 16px;font-family:inherit;font-size:14px;
  font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--brand);color:var(--brand);background:#f7faff}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:#1f5be0;color:#fff}
.btn-primary.active{background:#10243f;border-color:#10243f}
.btn:focus-visible,.jchip:focus-visible,.sortsel:focus-visible,.search input:focus-visible,.ttl:focus-visible{outline:3px solid #1652d6;outline-offset:2px;border-radius:8px}
.search:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(47,109,246,.15)}
.panel{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;display:none}
.panel.open{display:block;animation:rise .3s ease both}
.abx{color:#33405c;font-size:14.5px;line-height:1.7}

/* analysis */
.an-verdict{background:linear-gradient(90deg,#fff7df,#fffdf6);border-right:5px solid #e7b400;padding:13px 16px;border-radius:11px;font-weight:700;font-size:15.5px;margin-bottom:12px}
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.an-h{font-weight:800;font-size:14px;margin:14px 0 7px;display:flex;align-items:center;gap:6px}
.an-strong{background:#edf9f0;border-right:3px solid #2a9d4a;padding:8px 12px;border-radius:9px;margin:6px 0;font-size:13.5px;line-height:1.55}
.an-weak{background:#fdeeee;border-right:3px solid #d9534f;padding:8px 12px;border-radius:9px;margin:6px 0;font-size:13.5px;line-height:1.55}
.sev{font-weight:800;font-size:11px;border-radius:6px;padding:1px 6px;margin-left:5px}
.sev-גבוהה{background:#d9534f;color:#fff}.sev-בינונית{background:#e8a200;color:#fff}.sev-נמוכה{background:#9aa6b8;color:#fff}
.an-info{background:#eaf3ff;border:1px solid #cfe0fb;padding:11px 14px;border-radius:11px;font-size:14px;line-height:1.65;margin:8px 0}
.an-bottom{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
.an-box{background:#f6f8fc;border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:13.5px;line-height:1.6}
.an-box b{display:block;margin-bottom:5px}
.an-rounds{margin-top:12px;background:#e8f7ee;border:1px solid #bfe6cd;border-radius:11px;padding:11px 14px;font-weight:600}
.scope-warn{background:#fff3cd;border:1px solid #f3df9a;border-radius:10px;padding:9px 13px;font-size:13px;margin-bottom:10px}
.empty{text-align:center;color:var(--muted);padding:50px 0}
.badge5{background:#10243f;color:#fff;border-radius:9px;padding:5px 11px;font-weight:800;font-size:14px}
@media(max-width:680px){
  .an-grid,.an-bottom{grid-template-columns:1fr}
  .hero{padding:22px 0 64px}.hero h1{font-size:22px}.hero .sub{font-size:13px}
  .hero .stats{gap:14px}.hero .stats b{font-size:15px}
  .toolbar{margin-top:-40px;flex-direction:column;align-items:stretch}
  .sortsel{width:100%}
  .card{padding:16px 16px}.card .head{gap:11px}
  .ring{width:52px;height:52px;font-size:18px}
  .ttl{font-size:16.5px}
  .btn{padding:8px 13px;font-size:13px}
  .feed{margin-top:14px}
}
.foot{max-width:1080px;margin:0 auto 40px;padding:0 16px;color:var(--muted);font-size:12.5px;text-align:center}
.legend{max-width:1080px;margin:0 auto 8px;padding:0 16px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-size:12px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.fab{position:fixed;bottom:22px;left:22px;display:flex;flex-direction:column;gap:10px;z-index:50}
.fab button{width:46px;height:46px;border-radius:50%;border:0;background:#fff;color:var(--brand);box-shadow:0 6px 18px rgba(20,30,70,.18);
  font-size:18px;cursor:pointer;transition:.15s}
.fab button:hover{background:var(--brand);color:#fff;transform:translateY(-2px)}
@media print{
  body{background:#fff}
  .toolbar,.chips,.fab,.actions,.hero .stats{display:none!important}
  .hero{background:#fff!important;color:#10243f!important;box-shadow:none;padding:6px 0}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc;margin-bottom:10px}
  .panel{display:block!important}
  .ring{box-shadow:none!important;border:1.5px solid #444}
  a{color:#10243f!important}
}
</style>
</head>
<body>
<div class="hero"><div class="wrap">
  <h1>🩺 LitRadar — דייג'סט שבועי</h1>
  <div class="sub">המאמרים הנבחרים מעיתוני הליבה · רק RCT, מטא-אנליזות, סקירות והנחיות · מדורגים לפי חשיבות</div>
  <div class="stats" id="stats"></div>
</div></div>

<div class="toolbar">
  <div class="search">🔎<input id="q" aria-label="חיפוש מאמרים" placeholder="חיפוש בכותרת / תקציר / נושא…" oninput="render()"></div>
  <select class="sortsel" id="topic" aria-label="סינון לפי נושא" onchange="render()">
    <option value="">כל הנושאים</option>
  </select>
  <select class="sortsel" id="sort" aria-label="מיון" onchange="render()">
    <option value="imp">מיון: חשיבות</option>
    <option value="date">מיון: תאריך</option>
    <option value="journal">מיון: עיתון</option>
  </select>
  <div class="seg">
    <button id="vr" class="on" onclick="setView('rank')">מדורג</button>
    <button id="vg" onclick="setView('group')">לפי עיתון</button>
  </div>
</div>
<div class="chips" id="chips"></div>
<div class="feed" id="feed"></div>
<div class="legend" id="legend"></div>
<div class="foot" id="foot"></div>
<div class="fab">
  <button title="הדפסה לג'רנל קלאב" aria-label="הדפסה" onclick="printAll()">🖨</button>
  <button title="חזרה למעלה" aria-label="חזרה למעלה" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</div>

mising, safe, and accessible preventive strategy for gestational diabetes and reinforce its potential role in improving maternal metabolic health.", "journal": "AJOG", "journal_full": "American journal of obstetrics and gynecology", "date": "2026-06-03", "authors": ["Poyatos León Raquel", "Martínez-Vizcaíno Vicente", "Sequí Domínguez Irene", "Sanabria Martínez Gema", "Díez Fernández Ana", "Alberto Martínez Hortelano José"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article", "Review"], "importance": 72, "doi": "10.1016/j.ajog.2026.05.020", "analysis": {"verdict_line": "מטא-אנליזה של 12 RCT: מיו-אינוזיטול מפחית אבחנת GDM ב-44% — אך תוצאים קליniים קשים לא השתפרו.", "critic_score": 3, "score_rationale": "רמת ראיות גבוהה (מטא של RCTs) אך התועלת על תוצאים קשים נעדרת, וההפחתה מדווחת יחסית בלבד.", "evidence_level": "Oxford CEBM 1a (מטא-אנליזה של RCTs) · GRADE: Moderate (חשש להטיה והטרוגניות)", "source_scope_warning": "הניתוח מבוסס תקציר בלבד — I², רווחי סמך, ומידע על הטיית פרסום אינם זמינים.", "study_snapshot": {"design": "סקירה שיטתית ומטא-אנליזה (random-effects) של 12 RCT", "population": "4,765 נשים ללא סוכרת קודמת, בהריון או טרום-הריון", "n": "4,765 (12 מחקרים)", "intervention": "תוסף מיו-אינוזיטול מול פלצבו/טיפול רגיל", "primary_outcome": "אבחנת סוכרת הריון (GDM)", "key_result": "הפחתה יחסית של 44% ב-GDM (RR לא דווח במדויק בתקציר); תוצאים משניים — ללא הבדל מובהק"}, "strengths": ["תכנון ברמת הראיות הגבוהה ביותר — מטא-אנליזה של RCTs בלבד.", "מדגם מצרפי גדול (4,765 נשים, 12 מחקרים) ומנוע random-effects ההולם הטרוגניות.", "חיפוש מקיף (5 מאגרים) + ניתוחי רגישות leave-one-out + הערכת הטיה לפי Cochrane.", "תוצאה עקבית בכיוון תועלת על התוצא הראשוני."], "weaknesses": [{"issue": "התועלת על תוצאים קליניים קשים נעדרת: מקרוזומיה, HDP, קיסרי, היפוגליקמיה ילודית — ללא הבדל מובהק.", "severity": "גבוהה", "impact": "GDM הוא תוצא-ביניים; ללא שיפור בתוצאים האמיתיים, המשמעות הקלינית של ההפחתה מוגבלת."}, {"issue": "'44% הפחתה' הוא ערך יחסי; הפחתה מוחלטת ו-NNT לא דווחו בתקציר.", "se ding (TB), defined as isolated single cells or small clusters at the invasive front, has emerged as an adverse prognostic marker in several solid tumors. Its prognostic value in endometrial carcinoma (EC), however, remains uncertain.\nMETHODS: We conducted a systematic review and meta-analysis (PROSPERO registration: CRD420251066731) of studies evaluating the association between TB and survival outcomes and lymph node positivity in EC. Comprehensive searches of CENTRAL, MEDLINE, PubMed, Scopus, and Google Scholar identified eligible observational studies.\nRESULTS: Ten studies comprising 1307 patients were included. TB was significantly associated with reduced progression-free survival (hazard ratio [HR] 2.44, 95% confidence interval [CI] 1.53-3.89) and overall survival (HR 1.89, 95% CI 1.21-2.96). Sensitivity analyses revealed attenuation of these associations after accounting for small-study effects, although trim-and-fill estimates remained statistically significant for progression-free survival. Evidence for an association between TB and lymph node metastasis was inconsistent and not robust after correction for potential bias.\nCONCLUSION: Tumor budding is associated with adverse survival outcomes in EC, highlighting its potential as a histopathological biomarker of aggressive disease. However, heterogeneity in assessment methods and limited integration with molecular classification constrain its current clinical applicability. Standardized evaluation and validation in large, molecularly stratified cohorts are essential to establish TB as an independent prognostic factor and to define its role in guiding adjuvant treatment decisions.", "journal": "White Journal?", "journal_full": "International journal of gynaecology and obstetrics: the official organ of the International Federation of Gynaecology and Obstetrics", "date": "2026-06-08", "authors": ["Fanaki Maria", "Lygizos Vasilios", "Nikolaos Thomakos", "Vlachos Dimitrios Efthimios", "Dimitrios Haidopoulos", "Pergialiotis Vasilios"], "topics": ["אונקוגינקולוגיה"], "pub_types": ["Journal Article", "Review"], "importance": 71, "doi": "10.1002/ijgo.71100", "analysis": null, "analysis_scope": null}, {"pmid": "42183746", "title": "Effectiveness of immersive virtual reality-based interventions for alleviating peri- and post-procedural pain and anxiety in gynecologic settings: A systematic review and meta-analysis of randomized controlled trials.", "abstract": "BACKGROUND: Non-pharmacological and complementary therapeutic, notably immersive virtual reality-based interventions (IVR), could alleviate pain and anxiety associated with gynecologic procedures.\nOBJECTIVE: To evaluate the effectiveness of IVR in reducing peri- and post-procedural pain and anxiety in gynecologic procedures. Secondarily, to determine the safety of IVR.\nSEARCH STRATEGY: A systematic review with meta-analysis was conducted, after searching in PubMed/Medline, SCOPUS, Web of Science, CINAHL Complete and PEDro from database inception to September 2025 with no language or publication date restrictions set.\nSELECTION CRITERIA: Inclusion criteria were based on the PICOS framework: Population (patients undergoing gynecologic procedures), Intervention (IVR), Comparison (standard care or other therapeutic approaches), Outcomes (pain, anxiety and adverse events) and Study design (randomized controlled trials [RCTs]).\nDATA COLLECTION AND ANALYSIS: Pooled effects were calculated using Cohen's standardized mean difference (SMD) and its 95% confidence intervals (95% CI) in a random-effects model. Potential adverse events during IVR exposure were also compiled.\nMAIN RESULTS: A total of 25 randomized controlled trials (RCTs), comprising data from 2438 women (mean age 35.3 ± 12.6 years), were included. Intraprocedural outcomes indicated that IVR significantly decreased both pain (SMD = -0.46, 95% CI: -0.71 to -0.21, P < 0.001) and anxiety (SMD = -0.33, 95% CI: -0.63 to -0.03, P = 0.031). Post-procedurally, IVR yielded further reductions in pain (SMD = -0.81, 95% CI: -1.12 to -0.5, P < 0.001) and anxiety (SMD = -0.76, 95% CI: -1.22 to -0.3, P = 0.001). Reported adverse events were minor and infrequent.\nCONCLUSION: This meta-analysis suggests that IVR serves as a highly effective and safe non-pharmacological adjunct for mitigating peri- and post-procedural pain and anxiety in gynecologic settings. Translating these findings into clinical practice could substantially enhance patient care and overall experience.\nPROSPERO REGISTRATION: CRD420251000835.", "journal": "White Journal?", "journal_full": "International journal of gynaecology and obstetrics: the official organ of the International Federation of Gynaecology and Obstetrics", "date": "2026-05-25", "authors": ["González-Lara Cristina", "Piñar-Lara Marina", "Obrero-Gaitán Esteban", "García-López Héctor", "Cortés-Pérez Irene"], "topics": ["כללי / לא מסווג"], "pub_types": ["Journal Article", "Review"], "importance": 70, "doi": "10.1002/ijgo.71095", "analysis": null, "analysis_scope": null}, {"pmid": "42087457", "title": "Reproductive outcomes after rescue luteal phase support for women with low serum progesterone in artificial cycles around frozen embryo transfer day: Systematic review and network meta-analysis of over 7500 patients.", "abstract": "BACKGROUND: Low serum progesterone levels around the time of frozen embryo transfer (FET) in artificially prepared cycles have been associated with reduced reproductive success. Rescue luteal phase support (LPS) has been proposed as a strategy to optimize outcomes in these cases.\nOBJECTIVES: This study assesses the effectiveness of rescue LPS in improving reproductive outcomes among women with suboptimal serum progesterone levels prior to FET.\nMETHOD: A comprehensive literature search was conducted to identify randomized and non-randomized (prospective or retrospective) studies evaluating the impact of additional progesterone administration in women with low serum levels around FET in artificial cycles. Twelve observational studies comprising more than 7500 participants were included. Eligible studies assessed clinical outcomes following supplemental progesterone via various routes in patients with below-threshold serum levels. A network meta-analysis was performed to compare the effectiveness of different rescue LPS protocols. Routes of progesterone administration included intramuscular, vaginal, oral, subcutaneous, and rectal. Primary outcomes included clinical pregnancy rate, live birth rate, ongoing pregnancy rate, pregnancy loss rate, and biochemical pregnancy rate.\nRESULTS: Rescue LPS in women with low serum progesterone was associated with improved reproductive outcomes, approaching that observed in women with adequate progesterone levels. Intramuscular and vaginal administration were frequently ranked highest, although no protocol demonstrated clear superiority. Significant heterogeneity existed across studies, particularly regarding progesterone cutoff values.\nCONCLUSION: Rescue luteal phase support appears to be a promising approach for managing low serum progesterone before FET. However, randomized controlled trials with standardized thresholds and protocols are needed to confirm these findings and guide clinical practice.", "journal": "White Journal?", "journal_full": "International journal of gynaecology and obstetrics: the official organ of the International Federation of Gynaecology and Obstetrics", "date": "2026-05-05", "authors": ["Etrusco Andrea", "Agrifoglio Vittorio", "D'Amato Antonio", "Wyns Christine", "Di Donna Mariano Catello", "Vitagliano Amerigo", "Alviggi Carlo", "Conforti Alessandro", "Laganà Antonio Simone", "Busnelli Andrea", "Levi Setti Paolo Emanuele", "Riemma Gaetano"], "topics": ["פוריות ו-IVF"], "pub_types": ["Journal Article", "Review"], "importance": 70, "doi": "10.1002/ijgo.71059", "analysis": null, "analysis_scope": null}, {"pmid": "42055184", "title": "Late-onset diagnosis of gestational diabetes after normal mid-pregnancy screening in women with large for gestational age or polyhydramnios: a systematic review and meta-analysis.", "abstract": "OBJECTIVE: To determine the detection rate of late-onset gestational diabetes mellitus and associated perinatal outcomes in women with normal mid-pregnancy glucose screening who undergo repeat oral glucose tolerance test due to suspected large-for-gestational-age fetuses or polyhydramnios.\nDATA SOURCES: We systematically searched PubMed/MEDLINE, Embase, Web of Science, and the Cochrane Library for studies published from January 2010 to November 2024.\nSTUDY ELIGIBILITY CRITERIA: We included cohort studies reporting late gestational diabetes mellitus detection rates in women with documented normal mid-pregnancy glucose testing (negative glucose challenge test or normal 75 g oral glucose tolerance test at 24-28 weeks) who underwent repeat oral glucose tolerance test after 28 weeks due to sonographic findings of suspected large for gestational age or polyhydramnios. We excluded studies of women with preexisting diabetes, those lacking documented normal mid-pregnancy screening, and those examining routine late testing without specific clinical indication.\nSTUDY APPRAISAL AND SYNTHESIS METHODS: Study quality was assessed using the Newcastle-Ottawa Scale. Pooled detection rates with 95% confidence intervals were calculated using random-effects meta-analysis. Subgroup analyses were performed by clinical indication, timing of testing, initial screening method (2-step vs 1-step), and maternal body mass index. Perinatal outcomes were compared using pooled odds ratios calculated with the Mantel-Haenszel method.\nRESULTS: Six cohort studies including 2166 women met inclusion criteria. The pooled detection rate was 15.0% (95% confidence interval, 9.9%-21.0%; I2=91%). Detection rates varied significantly by indication: suspected large for gestational age 20.8% (95% confidence interval, 17.4%-24.6%) vs isolated polyhydramnios 4.8% (95% confidence interval, 2.0%-10.8%). Women with late-onset gestational diabetes mellitus had significantly higher rates of neonatal hypoglycemia (odds ratio, 1.82; 95% confidence interval, 1.18-2.81), overall cesarean delivery (odds ratio, 2.00; 95% confidence interval, 1.47-2.72), elective cesarean for large for gestational age/macrosomia (odds ratio, 3.37; 95% confidence interval, 2.01-5.64), emergent cesarean (odds ratio, 1.64; 95% confidence interval, 1.05-2.57), and induction of labor (odds ratio, 2.27; 95% confidence interval, 1.32-3.89). Macrosomia by birthweight and large for gestational age at delivery were not significantly elevated.\nCONCLUSION: Late oral glucose tolerance test detects gestational diabetes mellitus in approximately one in 6 women with normal mid-pregnancy screening who develop large for gestational age or polyhydramnios. Late-onset gestational diabetes mellitus is associated with significantly increased neonatal hypoglycemia and cesarean delivery, with the largest effect for elective cesarean for suspected large for gestational age/macrosomia. These findings may inform clinical decision-making regarding repeat glucose testing in the third trimester.", "journal": "AJOG", "journal_full": "American journal of obstetrics and gynecology", "date": "2026-04-27", "authors": ["Dominsky Omri", "Berkovitz-Shperling Roza", "Rosenberg-Fridman Michal", "Gabbai Daniel", "Ram Shai", "Yogev Yariv"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article", "Review"], "importance": 68, "doi": "10.1016/j.ajog.2026.04.036", "analysis": null, "analysis_scope": null}, {"pmid": "42252605", "title": "Association Between Lateral Placenta and Adverse Maternal and Perinatal Outcomes: A Systematic Review and Meta-Analysis.", "abstract": "BACKGROUND: Adverse maternal and perinatal outcomes such as preeclampsia, small-for-gestational age (SGA) and preterm birth remain major global health concerns. Beyond known high-risk placental features, emerging evidence suggests lateral placenta to be associated with impaired uteroplacental blood flow resulting in placenta dysfunction and adverse outcomes. A better understanding of these associations requires synthesizing both crude and adjusted effect estimates from available evidence.\nOBJECTIVES: To comprehensively review and synthesize available evidence on the association between lateral placenta and adverse maternal and perinatal outcomes.\nSEARCH STRATEGY: MEDLINE (PubMed), EMBASE, Scopus and Cochrane CENTRAL were searched on 25th August, 2025.\nSELECTION CRITERIA: Studies that assessed the association between lateral placentation and adverse maternal and perinatal outcomes in singleton pregnancies.\nDATA COLLECTION AND ANALYSIS: Data were independently extracted by two reviewers. The random-effects model was used to pool estimates of both crude and adjusted odds ratios (ORs) with corresponding 95% confidence interval (CI). Statistical heterogeneity was assessed by the I2 statistic and Cochran's Q test.\nMAIN RESULTS: Twenty one eligible studies with a total of 162 727 singleton pregnancies were included in the meta-analyses. Lateral placenta was associated with preeclampsia (OR = 1.65, 95% CI: 1.25, 2.19, I2 = 41.0%), SGA (OR = 1.40, 95% CI: 1.17, 1.68, I2 = 69.0%), preterm birth < 34 weeks (OR = 2.10, 95% CI: 1.62, 2.72, I2 = 0.0%), preterm birth < 37 weeks (OR = 1.50, 95% CI: 1.26, 1.80, I2 = 60.5%), retained placenta (OR = 2.52, 95% CI: 1.60, 3.95, I2 = 87.7%), and non-vertex foetal presentation at birth (OR = 1.50, 95% CI: 1.19, 1.89, I2 = 28.6%). Two individual studies reported independent association between lateral placenta and preeclampsia; with adjusted odds ratio (aOR) of 2.04 (95% CI: 1.28, 3.25) and 1.32 (95% CI: 1.04, 1.67). Pooled adjusted OR (95% CI) demonstrated increased odds of SGA (aOR = 1.84, 95% CI: 1.33, 2.53, I2 = 0.0%), and retained placenta (aOR = 4.43, 95% CI: 1.70, 11.53, I2 = 76.1%). Marginal increase in odds was noted for preterm birth < 34 weeks (aOR = 2.14, 95% CI: 1.34, 3.41, I2 = 0.00%) and preterm birth < 37 weeks (aOR = 1.54, 95% CI: 1.11, 2.13, I2 = 38.8%).\nCONCLUSIONS: Lateral placenta is associated with increased odds of preeclampsia, SGA, preterm birth, non-vertex foetal presentation, and retained placenta. After controlling for confounders, lateral placenta remained independently associated with increased odds of SGA, preterm birth, and retained placenta. More studies that adjust for confounders are, however, needed to further clarify and strengthen the evidence base of this independent association.", "journal": "BJOG", "journal_full": "BJOG : an international journal of obstetrics and gynaecology", "date": "2026-06-07", "authors": ["Arkorful Joseph", "Nyamson Juliana", "Adu-Bredu Theophilus", "Adu-Bonsaffoh Kwame", "Browne Joyce", "Piersson Albert D", "Bloemenkamp Kitty"], "topics": ["סיבוכי הריון", "רפואת אם-עובר"], "pub_types": ["Journal Article", "Review"], "importance": 67, "doi": "10.1111/1471-0528.70278", "analysis": null, "analysis_scope": null}, {"pmid": "42241699", "title": "Antenatal Corticosteroid Use in Twin Pregnancies: A Systematic Review and Meta-analysis.", "abstract": "OBJECTIVE: To synthesize evidence on the benefit-risk profile of antenatal corticosteroid (ACS) exposure in twin pregnancies and to explore effect modification by gestational age at birth and study design.\nDATA SOURCES: PubMed, Embase, ClinicalTrials.gov, and Cochrane Central Register of Controlled Trials (from inception to October 2025) were searched using terms for twin pregnancy or multiple gestation and antenatal corticosteroids (eg, betamethasone, dexamethasone).\nMETHODS OF STUDY SELECTION: In accordance with Preferred Reporting Items for Systematic Reviews and Meta-analysis (PROSPERO CRD420251275650), we included randomized controlled trials (RCTs) and observational studies comparing ACS exposure with no ACS in twin pregnancies and reporting neonatal outcomes. Observational studies were eligible only if they reported adjusted effect estimates accounting for relevant confounders. Primary outcomes were neonatal mortality and neonatal hypoglycemia; key secondary outcomes included neonatal intensive care unit (NICU) or special care unit admission and major respiratory outcomes. Risk of bias was assessed with version 2 of the Cochrane Risk of Bias tool and Risk of Bias in Non-randomized Studies of Interventions.\nTABULATION, INTEGRATION, AND RESULTS: Random-effects meta-analyses were conducted to estimate risk ratios (RRs) with 95% CIs. Heterogeneity was assessed with the I2 statistic, and small-study effects were evaluated when feasible. Prespecified subgroup analyses examined gestational age (less than 34 weeks vs 34 or more weeks) and study design. Sixteen studies (18,367 neonates, 8,723 ACS exposed) were included. Overall, the certainty of evidence was moderate to low. Exposure to ACS was not significantly associated with a reduction in neonatal mortality (RR 0.77, 95% CI, 0.59-1.01). Antenatal corticosteroid was not associated with a reduction in respiratory distress syndrome (RDS) overall (RR 1.11, 95% CI, 0.81-1.52), and gestational age-stratified analyses were nonsignificant; however, analyses restricted to RCTs suggested a higher risk of RDS among ACS-exposed neonates (P<.001). Exposure to ACS was associated with increased supplemental oxygen requirement (RR 1.72, 95% CI, 1.07-2.74), neonatal hypoglycemia (RR 1.80, 95% CI, 1.30-2.51), and NICU or special care unit admission (RR 1.33, 95% CI, 1.07-1.64), with consistent hypoglycemia effects across gestational ages.\nCONCLUSION: In twin pregnancies, ACS exposure was not consistently associated with improved neonatal outcomes, with no overall reduction in RDS and neonatal mortality. Associations with increased risks of hypoglycemia, oxygen requirement, and NICU or special care unit admission were observed. Given the moderate-to-low certainty of the available evidence, these findings should be interpreted cautiously.\nSYSTEMATIC REVIEW REGISTRATION: PROSPERO, CRD420251275650.", "journal": "Green Journal", "journal_full": "Obstetrics and gynecology", "date": "2026-06-04", "authors": ["Felippe Carolina Alves", "Ruiz Sinrraim Dos Santos Chaves", "de Souza Rebeca Ferreira", "de Lima Aliny Silva", "Dos Santos Priscila Luiza", "Fonseca Pandora Eloa Oliveira", "de Almeida Silva Ingryd", "Montes-de-Oca-Saucedo Carlos Roberto", "Santana Ana Cecília Oliveira", "Veta Darkovski Jasmina", "Matlaw Hadas Rachel", "Fonseca Queiroz Laura"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article"], "importance": 67, "doi": "10.1001/jamapediatrics.2025.3284", "analysis": null, "analysis_scope": null}, {"pmid": "41982049", "title": "Integrating Social and Clinical Determinants of Pre-Eclampsia: A Hierarchical Systematic Review and Conceptual Framework for Prevention.", "abstract": "BACKGROUND: Pre-eclampsia is a leading cause of maternal and perinatal morbidity and mortality, with risk factors reported across a vast literature base fragmented between social and clinical factors.\nOBJECTIVE: To develop a comprehensive conceptual framework of the strongest risk factors and their relationships contributing to pre-eclampsia incidence.\nSEARCH STRATEGY: Medline, Embase, Health Technology Assessments and Database of Abstracts of Reviews of Effects, Cochrane Library were searched.\nSELECTION CRITERIA: Reviews, randomized controlled trials and cohort studies (> 1000 participants), reporting social and clinical factors associated with pre-eclampsia were included.\nDATA COLLECTION AND ANALYSIS: The strongest factors, defined as those with at least moderate strength of association and quality of evidence using GRADE, were compiled from our previously published individual frameworks to create a combined conceptual framework. Indirect associations were searched and the strongest indirect factors were added.\nMAIN RESULTS: The conceptual framework integrated 35 social and clinical determinants of pre-eclampsia. Key modifiable factors included BMI, interlinked with chronic hypertension/elevated blood pressure in early pregnancy, type 2 diabetes mellitus, and obstructive sleep apnoea, as well as antenatal care attendance, interconnected with maternal/work stress and prenatal micronutrient supplementation. Other modifiable factors included smoking, antiphospholipid syndrome, infection, exposure to occupational hazards, distance to health facility, maternal heat exposure in early gestation, and UV-B exposure.\nCONCLUSION: There are strong social factors alongside clinical factors associated with pre-eclampsia incidence. Interwoven relationships between factors highlight the multifactorial aetiology of pre-eclampsia. Many determinants were potentially modifiable, which provides actionable intervention points for clinical care and public health strategies.", "journal": "BJOG", "journal_full": "BJOG : an international journal of obstetrics and gynaecology", "date": "2026-04-14", "authors": ["Woo Kinshella Mai Lei", "Bone Jeffrey N", "Elawad Terteel", "Mistry Hiten D", "Poye Laney", "Tsigas Eleni", "Devadas Deepika", "Mateljan Violet", "Volvert Marie-Laure", "Vidler Marianne", "Blencowe Hannah", "Filippi Véronique", "Magee Laura A", "von Dadelszen Peter"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article"], "importance": 66, "doi": "10.1111/1471-0528.70240", "analysis": null, "analysis_scope": null}, {"pmid": "42208069", "title": "Carbon Dioxide Nonablative Laser Compared with Topical Clobetasol for Lichen Sclerosus: A Randomized Controlled Trial.", "abstract": "OBJECTIVE: To compare nonablative carbon dioxide (CO2) laser treatment with topical clobetasol propionate for symptom control in women with vulvar lichen sclerosus (LS).\nMETHODS: We conducted a prospective, randomized, open-label trial that included women with symptomatic LS. Participants were randomized to three courses of CO2 laser treatment every 3 weeks or to a 3-month regimen of tapered topical clobetasol propionate 0.05%. The primary outcome was the change in the BIP (burn-itch-pain) score (range 0-30) from baseline to 3 months. Secondary outcomes included physician-rated visual improvement and overall improvement, and disease-specific quality of life (QOL). Ninety participants per group provided 90% power to detect a 2-point between-group BIP score difference (SD 4; 2-sided α=0.05). Analyses were intention-to-treat. Prespecified multivariable linear regression adjusted for baseline symptom severity, age, body mass index (BMI), smoking status, previous corticosteroid use, and disease duration.\nRESULTS: Between November 2021 and March 2025, 245 women were randomized (laser: n=123; clobetasol propionate: n=122). At 3 months, symptom improvement was greater in the laser group (median ΔBIP score -8 [IQR -13 to-3]) than in the clobetasol propionate group (-5 [IQR, -10.75 to 0]; P=.007). In the multivariable analysis, laser treatment remained independently associated with greater symptom improvement (adjusted β, -2.90; 95% CI, -4.64 to -1.15; P=.001). Physician-rated visual improvement and overall improvement, and disease-specific QOL change favored laser therapy. Both treatments were generally well tolerated, with no serious treatment-related adverse events. During an exploratory postrandomization phase after the 3-month primary endpoint assessment, participants could choose to cross over to the alternative treatment. Patients who crossed over from clobetasol propionate to laser experienced additional symptom improvement from 3 to 6 months. Results were robust to sensitivity analyses for missing outcome data.\nCONCLUSION: Laser treatment resulted in greater symptom improvement than clobetasol propionate therapy for women with vulvar LS. Sequential treatment with clobetasol propionate followed by CO2 laser may further improve clinical symptoms.\nCLINICAL TRIAL REGISTRATION: ClinicalTrials.gov, NCT05010421.", "journal": "Green Journal", "journal_full": "Obstetrics and gynecology", "date": "2026-05-28", "authors": ["Hecken Julia M", "Shoham Ilana", "Tempfer Clemens B", "Rezniczek Günther A"], "topics": ["סיבוכי הריון"], "pub_types": ["Journal Article"], "importance": 65, "doi": "10.1109/MCSE.2007.55", "analysis": null, "analysis_scope": null}, {"pmid": "42087841", "title": "Factors Associated With Menopause Symptoms: A Systematic Review and Meta-Analysis.", "abstract": "BACKGROUND: Menopause, marked by hormonal decline and menstrual cessation, is associated with various symptoms. Socio-demographic and behavioural factors may influence symptom type and severity. Understanding these associations can inform better symptom management.\nOBJECTIVES: To identify factors associated with the presence and severity of menopausal symptoms through systematic review and meta-analysis.\nSEARCH STRATEGY: We searched Medline, Embase, CINAHL and Cochrane for studies on demographic, behavioural, or health factors linked to vasomotor, vaginal dryness and joint symptoms in women aged 40-60.\nSELECTION CRITERIA: Studies reporting odds ratios or raw numbers for symptom presence or severity were included.\nDATA COLLECTION AND ANALYSIS: Studies were combined for meta-analysis, reporting odds ratios and 95% confidence intervals. Quality assessment was performed to quantify the risk of bias.\nRESULTS: Of 9228 screened articles, 61 were meta-analysed. Compared with White women, Black women had higher odds of vasomotor symptom presence (OR 1.65, 1.41-1.94) and severity (OR 1.91, 1.10-3.29), and vaginal dryness presence (OR 1.27, 1.10-1.47), while Asian had lower vasomotor symptom presence and severity (OR 0.40, 0.22-0.72; OR 0.55, 0.53-0.56). Higher education (OR 1.31, 1.09-1.56), high income (OR 1.41, 1.01-1.97) and depression (OR 2.36, 1.51-3.70) were associated with increased presence of vasomotor symptoms. Smoking and obesity were associated with both presence (OR 1.63, 1.30-2.04 and 1.35, 1.02-1.78) and severity (OR 1.56, 1.07-2.27 and 1.42, 1.11-1.83) of vasomotor symptoms.\nCONCLUSION: Socio-demographic and behavioural factors, including ethnicity, education, income, smoking, obesity and depression, influence menopausal symptoms, highlighting the need for personalised care.\nTRIAL REGISTRATION: PROSPERO number: CRD42023459154.", "journal": "BJOG", "journal_full": "BJOG : an international journal of obstetrics and gynaecology", "date": "2026-05-06", "authors": ["Hoang Janice", "Halliday Kathryn", "Allen Deborah", "Mtika Wema Meranda", "Tranter Eve", "Glover Grace", "Tatnell Lynn", "Hippisley-Cox Julia", "Coupland Carol", "Hillman Sarah", "Hirst Jennifer"], "topics": ["הפרעות מחזור והורמונים"], "pub_types": ["Journal Article", "Review"], "importance": 64, "doi": "10.1111/1471-0528.70257", "analysis": null, "analysis_scope": null}, {"pmid": "42070572", "title": "Effects of ovarian ablation or suppression on breast cancer recurrence and survival: patient-level meta-analysis of 15 000 women in 23 randomised trials.", "abstract": "BACKGROUND: For premenopausal women with oestrogen receptor (ER)-positive early breast cancer, the additional protective effect of ovarian function suppression (OFS, by ablation or drugs) may depend on menopausal status after any chemotherapy, and tamoxifen usage. We assess the effects of OFS on breast cancer outcomes among premenopausal women and how they vary by patient or tumour characteristics and receipt of other treatments.\nMETHODS: We conducted a meta-analysis of individual participant data from the randomised trials comparing OFS versus no OFS, in women with ER-positive or ER-unknown early breast cancer who were premenopausal at randomisation and younger than 55 years. Trials were categorised by whether premenopausal status was or was not confirmed after chemotherapy (if given), and by allocation to tamoxifen. Primary outcomes were invasive breast cancer recurrence, breast cancer mortality, other mortality, and all-cause mortality. ER-weighted log-rank methods estimated event rate ratios (RRs) for ER-positive disease.\nFINDINGS: Datasets were provided for 23 of 25 identified eligible trials, comprising 18 851 (98·9%) of 19 053 randomly assigned women. Among 15 075 premenopausal women with ER-positive or ER-unknown tumours, allocation to OFS significantly reduced recurrence rates (RR 0·82, 95% CI 0·77-0·87; p<0·00001), with larger reductions in women who were confirmed premenopausal after chemotherapy (or who did not receive chemotherapy) than in those with unconfirmed premenopausal status after chemotherapy; heterogeneity p=0·0004. Among confirmed premenopausal women, recurrence reductions were larger in older trials without tamoxifen (RR 0·61, 0·52-0·71; p<0·0001) than in more recent trials of OFS plus tamoxifen versus tamoxifen (RR 0·79, 0·70-0·91; p=0·0008). In these more recent trials, the additional recurrence reduction with OFS appeared larger in women younger than 45 years than in women aged 45-54 years (RR 0·73, 0·63-0·86 vs RR 0·95, 0·75-1·21; p=0·072); in those younger than 45 years, breast cancer mortality was similarly improved (RR 0·74, 0·58-0·94; p=0·012). There was no increase in deaths without recurrence. Findings did not differ significantly by OFS method or other recorded patient or tumour characteristics.\nINTERPRETATION: For premenopausal women with ER-positive early breast cancer, even if chemotherapy or tamoxifen are given, OFS significantly reduces the 15-year risk of recurrence and death.\nFUNDING: Nuffield Department of Population Health, University of Oxford; Cancer Research UK; the Breast Cancer Research Foundation; and the UK Medical Research Council.", "journal": "Lancet", "journal_full": "Lancet (London, England)", "date": "2026-05-02", "authors": [], "topics": ["אונקוגינקולוגיה", "הפרעות מחזור והורמונים"], "pub_types": ["Journal Article", "Meta-Analysis"], "importance": 64, "doi": "10.1016/S0140-6736(26)00313-2", "analysis": null, "analysis_scope": null}, {"pmid": "42061782", "title": "Neonatal and obstetric outcomes following periconceptional exposure to glucagon-like peptide-1 receptor agonists: a systematic review and meta-analysis.", "abstract": "OBJECTIVE: To evaluate the association between periconceptional exposure to glucagon-like peptide-1 receptor agonists and fetal, pregnancy-related, obstetric, and delivery outcomes.\nDATA SOURCES: PubMed, Embase, and Web of Science were searched from database inception through November 2025 to identify relevant studies.\nSTUDY ELIGIBILITY CRITERIA: Cohort and observational studies comparing human pregnancies with periconceptional glucagon-like peptide-1 receptor agonist exposure to unexposed comparator groups were included. Case reports and case series were also included for narrative synthesis. Studies involving nonhuman animals were excluded from the primary meta-analysis but referenced in the background synthesis.\nSTUDY APPRAISAL AND SYNTHESIS METHODS: This systematic review was conducted according to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses guidelines. Random-effects meta-analyses were performed using odds ratios or mean differences with 95% confidence intervals. Heterogeneity was assessed using the I-squared statistic. Sensitivity analyses were conducted using comparator-specific control groups to account for maternal disease.\nRESULTS: Twenty-two studies, comprising 49,395 human pregnancies with periconceptional glucagon-like peptide-1 receptor agonist exposure, were included. Meta-analysis of 10 cohort and observational studies showed no statistically significant association between exposure and major congenital malformations, cardiac malformations, gestational age and weight, preterm delivery, live birth, spontaneous pregnancy loss, hypertensive disorders of pregnancy, or cesarean delivery. A small but statistically significant association with renal malformations was detected (odds ratio, 1.23; 95% confidence interval, 1.09-1.39); however, this was largely driven by a single large cohort with subst     let html='',last=null,idx=0;
    list.forEach(a=>{
      if(a.journal!==last){html+=`<div class="jhead" style="border-color:${jColor(a.journal)}">${esc(a.journal)}</div>`;last=a.journal;}
      html+=cardHTML(a,idx++);
    });
    feed.innerHTML=html;
  } else {
    feed.innerHTML=list.map((a,i)=>cardHTML(a,i)).join('');
  }
}
function setView(m){
  viewMode=m;
  document.getElementById('vr').classList.toggle('on',m==='rank');
  document.getElementById('vg').classList.toggle('on',m==='group');
  render();
}
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.id!=='q'){e.preventDefault();document.getElementById('q').focus();}
  if(e.key==='Escape'&&document.activeElement.id==='q'){document.getElementById('q').value='';render();}
});
function savePrefs(){try{localStorage.setItem('lr_sort',document.getElementById('sort').value);
  localStorage.setItem('lr_topic',document.getElementById('topic').value);}catch(e){}}
function loadPrefs(){try{const s=localStorage.getItem('lr_sort'),t=localStorage.getItem('lr_topic');
  if(s)document.getElementById('sort').value=s;
  if(t&&[...document.getElementById('topic').options].some(o=>o.value===t))document.getElementById('topic').value=t;}catch(e){}}
renderStats();populateTopics();loadPrefs();renderChips();renderLegend();render();
document.getElementById('sort').addEventListener('change',savePrefs);
document.getElementById('topic').addEventListener('change',savePrefs);
</script>
</body>
